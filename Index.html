<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#16365f" />
<title>ইনসাফ প্রপার্টি ম্যানেজার</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#16365f; --blue-d:#0f2746; --blue-l:#1f4a7a; --teal:#1a8fb8; --teal-d:#147a9c;
  --orange:#f47920; --orange-d:#d9650f;
  --bg:#eef2f7; --card:#ffffff; --ink:#16202b; --muted:#6b7785;
  --line:#e4eaf1; --err:#d64545; --ok:#1f9d61;
  --r:16px; --rs:11px;
  --sh:0 1px 2px rgba(20,40,70,.06),0 6px 20px rgba(20,40,70,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Hind Siliguri',system-ui,sans-serif;
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
}
h1,h2,h3,.num{font-family:'Sora','Hind Siliguri',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:15px}
.hidden{display:none!important}

/* ---------- Auth screen ---------- */
#auth{min-height:100dvh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--blue) 0%,var(--blue-d) 60%,#0a1d36 100%);padding:24px}
.auth-card{background:var(--card);border-radius:18px;padding:30px 24px;width:100%;max-width:360px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.brand{text-align:center;margin-bottom:22px}
.brand .logo{width:62px;height:62px;border-radius:16px;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;
  color:#fff;font-family:'Sora';font-weight:700;font-size:26px;box-shadow:var(--sh)}
.brand h1{font-size:19px;margin:0;color:var(--blue)}
.brand p{margin:3px 0 0;font-size:12.5px;color:var(--muted)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:12px 13px;border:1.5px solid var(--line);
  border-radius:var(--rs);background:#fbfcfd;color:var(--ink);outline:none;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);background:#fff}
.btn{width:100%;padding:13px;border-radius:var(--rs);font-weight:700;font-size:15px;transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:7px}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:active{background:var(--orange-d)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:active{background:var(--blue-d)}
.btn-ghost{background:#eef2f6;color:var(--blue)}
.btn-sm{width:auto;padding:8px 14px;font-size:13px;border-radius:7px}
.btn-danger{background:var(--err);color:#fff}
.err-msg{color:var(--err);font-size:13px;text-align:center;margin-top:10px;min-height:18px}

/* ---------- App shell ---------- */
#app{display:none;min-height:100dvh;padding-bottom:74px}
.topbar{position:sticky;top:0;z-index:30;
  background:linear-gradient(120deg,var(--blue) 0%,var(--blue-l) 100%);color:#fff;
  padding:calc(env(safe-area-inset-top) + 14px) 16px 18px;display:flex;align-items:center;gap:12px;
  border-radius:0 0 20px 20px;box-shadow:0 6px 20px rgba(15,39,70,.22)}
.topbar .t-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--orange));
  display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:700;font-size:16px;flex:0 0 auto}
.topbar .t-burger{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.16);color:#fff;
  font-size:18px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.topbar .t-burger:active{background:rgba(255,255,255,.3)}
.topbar h2{font-size:17px;margin:0;flex:1;font-weight:600;letter-spacing:.2px}
.topbar .who{font-size:11px;opacity:.85;text-align:right;line-height:1.3}
.wrap{padding:16px;max-width:760px;margin:0 auto}

/* building dropdown bar */
.bbar{padding:14px 16px 0;max-width:760px;margin:0 auto}
.bbar select{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:var(--rs);
  background:#fff;color:var(--blue);font-weight:600;outline:none;font-size:14px;box-shadow:var(--sh)}
.bbar select:focus{border-color:var(--teal)}

/* dashboard hero (signature: collection progress) */
.hero{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-l) 70%,var(--teal-d) 135%);
  border-radius:var(--r);padding:18px;color:#fff;box-shadow:0 8px 24px rgba(15,39,70,.25);margin-bottom:14px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero .h-lbl{font-size:12px;opacity:.85;font-weight:600}
.hero .h-big{font-family:'Sora';font-weight:700;font-size:30px;margin:2px 0 14px;letter-spacing:.5px}
.hero .prog{height:9px;border-radius:6px;background:rgba(255,255,255,.18);overflow:hidden;margin-bottom:7px}
.hero .prog i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#ffd9a8,var(--orange));transition:width .5s}
.hero .h-foot{display:flex;justify-content:space-between;font-size:12.5px}
.hero .h-foot b{font-family:'Sora';font-weight:600}
.hero .h-foot .g{color:#9ff0c4} .hero .h-foot .r{color:#ffc2c2}
/* occupancy bars */
.occ{display:flex;gap:11px}
.occ .ob{flex:1;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px}
.occ .ob .t{font-size:12.5px;color:var(--muted);font-weight:600;display:flex;justify-content:space-between}
.occ .ob .t b{font-family:'Sora';color:var(--ink)}
.occ .ob .bar{height:8px;border-radius:5px;background:#eaeff4;overflow:hidden;margin-top:9px}
.occ .ob .bar i{display:block;height:100%;border-radius:5px}
.occ .ob.r .bar i{background:var(--blue)} .occ .ob.s .bar i{background:var(--orange)}
.occ .ob .sub{font-size:11px;color:var(--muted);margin-top:6px}

/* cards & grid */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:16px;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.stat{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:15px 15px 14px;position:relative;overflow:hidden}
.stat .lbl{font-size:12px;color:var(--muted);font-weight:600}
.stat .val{font-family:'Sora';font-weight:700;font-size:23px;margin-top:4px;color:var(--blue)}
.stat .val small{font-size:12px;color:var(--muted);font-weight:500}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--teal)}
.stat.s-orange::before{background:var(--orange)} .stat.s-green::before{background:var(--ok)}
.stat.s-red::before{background:var(--err)} .stat.s-blue::before{background:var(--blue)}
.stat.s-green .val{color:var(--ok)} .stat.s-red .val{color:var(--err)} .stat.s-orange .val{color:var(--orange-d)}
.sec-title{font-size:13px;font-weight:700;color:var(--blue);margin:18px 4px 9px;text-transform:none;
  display:flex;align-items:center;gap:7px}
.sec-title::before{content:"";width:14px;height:3px;border-radius:2px;background:var(--orange)}

/* list rows */
.row{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .av{width:38px;height:38px;border-radius:10px;background:#eef3f8;color:var(--blue);
  display:flex;align-items:center;justify-content:center;font-weight:700;flex:0 0 auto;font-family:'Sora';font-size:13px}
.row .main{flex:1;min-width:0}
.row .main .n{font-weight:600;font-size:14.5px}
.row .main .s{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .end{text-align:right;flex:0 0 auto}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.tag.vac{background:#e9f7ef;color:var(--ok)} .tag.occ{background:#eef3f8;color:var(--blue)}
.tag.due{background:#fdeaea;color:var(--err)} .tag.paid{background:#e9f7ef;color:var(--ok)}
.tag.shop{background:#fff3e6;color:var(--orange-d)}
.amt{font-family:'Sora';font-weight:700} .amt.red{color:var(--err)} .amt.green{color:var(--ok)}
.empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:13.5px}
.empty .big{font-size:30px;margin-bottom:6px;opacity:.5}

/* bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);display:flex;padding:4px 6px env(safe-area-inset-bottom);
  box-shadow:0 -4px 18px rgba(20,40,70,.08)}
.nav button{flex:1;padding:8px 2px 7px;margin:2px;border-radius:13px;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted);font-size:10.5px;font-weight:600;transition:.18s}
.nav button .ic{font-size:19px;line-height:1;filter:grayscale(.4);opacity:.7;transition:.18s}
.nav button.active{color:var(--blue);background:#eaf2f9}
.nav button.active .ic{filter:none;opacity:1;transform:translateY(-1px)}

/* segmented */
.seg{display:flex;background:#eef2f6;border-radius:10px;padding:4px;margin-bottom:14px}
.seg button{flex:1;padding:9px;border-radius:7px;font-weight:700;font-size:13.5px;color:var(--muted)}
.seg button.active{background:#fff;color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* search */
.search{display:flex;gap:8px;margin-bottom:14px}
.search input{flex:1;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--rs);background:#fff;outline:none}
.search input:focus{border-color:var(--teal)}

/* due breakdown table */
.due-tbl{border:1px solid var(--line);border-radius:var(--rs);overflow:hidden;margin:12px 0}
.due-tbl .dr{display:flex;justify-content:space-between;padding:10px 13px;font-size:14px;border-bottom:1px solid var(--line)}
.due-tbl .dr:last-child{border-bottom:none}
.due-tbl .dr.cur{background:#fff8f0} .due-tbl .dr.cur .m::after{content:" • চলতি";color:var(--orange);font-size:11px;font-weight:700}
.due-tbl .dr.tot{background:var(--blue);color:#fff;font-weight:700;font-family:'Sora'}
.due-tbl .dr.paid-row{background:#f3f8f4}
.due-tbl .dr .m{color:var(--ink)} .due-tbl .dr.tot .m{color:#fff}
.due-tbl .dr .pd{color:var(--ok);font-size:11px;font-weight:700}

/* modal */
.modal-bg{position:fixed;inset:0;z-index:60;background:rgba(15,25,45,.55);
  display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:92dvh;overflow-y:auto;
  padding:8px 18px calc(env(safe-area-inset-bottom) + 22px);animation:slideup .25s}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal .handle{width:40px;height:4px;background:#d5dde4;border-radius:3px;margin:8px auto 14px}
.modal h3{margin:0 0 14px;font-size:17px;color:var(--blue)}
.modal-row{display:flex;gap:10px;margin-top:6px}
.modal-row .btn{flex:1}
.kv{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px dashed var(--line)}
.kv .k{color:var(--muted)} .kv .v{font-weight:600}

/* fab */
.fab{position:fixed;right:18px;bottom:84px;z-index:35;width:54px;height:54px;border-radius:50%;
  background:var(--orange);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(244,121,32,.45)}
.fab:active{background:var(--orange-d)}

/* toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);z-index:80;
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;
  opacity:0;transition:.25s;pointer-events:none;max-width:90%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.3)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* spinner */
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;
  animation:rot .7s linear infinite;margin:30px auto}
@keyframes rot{to{transform:rotate(360deg)}}
.loading{display:flex;justify-content:center;padding:20px}

/* receipt (printable) */
#receipt-print{display:none}
@media print{
  body *{visibility:hidden}
  #receipt-print,#receipt-print *{visibility:visible}
  #receipt-print{display:block!important;position:absolute;left:0;top:0;width:100%}
}
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">IP</div>
      <h1>ইনসাফ প্রপার্টি ম্যানেজার</h1>
      <p>রুম · শপ · ভাড়া · পেমেন্ট</p>
    </div>
    <div class="field"><label>ইমেইল</label><input id="li-email" type="email" autocomplete="username" placeholder="you@example.com"></div>
    <div class="field"><label>পাসওয়ার্ড</label><input id="li-pass" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="btn btn-primary" id="li-btn">লগইন</button>
    <div class="err-msg" id="li-err"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="topbar">
    <button class="t-burger" id="burger" aria-label="মেনু">☰</button>
    <h2 id="page-title">ড্যাশবোর্ড</h2>
    <div class="who"><div id="who-name">—</div><div id="who-role" style="opacity:.7"></div></div>
  </div>

  <div id="building-bar" class="bbar"></div>
  <div id="view" class="wrap"></div>

  <button class="fab hidden" id="fab">+</button>

  <nav class="nav">
    <button data-tab="dashboard" class="active"><span class="ic">🏠</span>ড্যাশবোর্ড</button>
    <button data-tab="rooms"><span class="ic">🛏️</span>রুম</button>
    <button data-tab="shops"><span class="ic">🏬</span>শপ</button>
    <button data-tab="payments"><span class="ic">💳</span>পেমেন্ট</button>
  </nav>
</div>

<div id="modal-root"></div>
<div id="toast"></div>
<div id="receipt-print"></div>

<div style="position:fixed;top:0;right:0;z-index:90;background:#f47920;color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-bottom-left-radius:8px;font-family:'Hind Siliguri',sans-serif">ডেমো মোড</div>
<script>
/* ============================================================
   ডেমো মোড — ইন-মেমরি ভুয়া Firebase (আসল লজিক অপরিবর্তিত)
   ============================================================ */
(function(){
  const now = Date.now();
  const day = 86400000;

  // ---------- seed data ----------
  const STORE = {
    properties: [
      {id:'pA', name:'ইনসাফ টাওয়ার', createdAt:now},
      {id:'pB', name:'মদিনা ম্যানশন', createdAt:now},
    ],
    rooms: [
      {id:'r101',propertyId:'pA',number:'১০১'},{id:'r102',propertyId:'pA',number:'১০২'},

      {id:'r105',propertyId:'pA',number:'১০৫'},
      {id:'r201',propertyId:'pB',number:'২০১'},{id:'r202',propertyId:'pB',number:'২০২'},
      {id:'r203',propertyId:'pB',number:'২০৩'},
    ],
    shops: [
      {id:'s1',number:'S1'},{id:'s2',number:'S2'},{id:'s3',number:'S3'},{id:'s4',number:'S4'},
    ],
    bookings_rooms: [
      {id:'br1',propertyId:'pA',unitId:'r101',unitNumber:'১০১',tenantName:'রহিম উদ্দিন',mobile:'8801711000001',iqama:'2412345678',monthlyRent:500,startDate:'2026-03-01',notes:'',status:'active',createdAt:now-40*day,createdBy:'admin'},
      {id:'br2',propertyId:'pA',unitId:'r102',unitNumber:'১০২',tenantName:'করিম মিয়া',mobile:'8801711000002',iqama:'2498765432',monthlyRent:450,startDate:'2026-05-01',notes:'',status:'active',createdAt:now-20*day,createdBy:'admin'},
      {id:'br3',propertyId:'pB',unitId:'r201',unitNumber:'২০১',tenantName:'সাবরিনা আক্তার',mobile:'8801711000003',iqama:'2455667788',monthlyRent:600,startDate:'2026-01-15',notes:'নিয়মিত',status:'active',createdAt:now-60*day,createdBy:'admin'},
    ],
    bookings_shops: [
      {id:'bs1',unitId:'s1',unitNumber:'S1',tenantName:'আলম স্টোর',mobile:'8801711000010',iqama:'2401010101',cycleRent:3000,cycleMonths:3,startDate:'2026-01-01',notes:'',status:'active',createdAt:now-50*day,createdBy:'admin'},
      {id:'bs2',unitId:'s2',unitNumber:'S2',tenantName:'নূর ফার্মেসি',mobile:'8801711000011',iqama:'2402020202',cycleRent:4000,cycleMonths:6,startDate:'2026-02-01',notes:'',status:'active',createdAt:now-30*day,createdBy:'admin'},
    ],
    payments: [
      // রহিম: মোট ১৩০০ (FIFO → মার্চ+এপ্রিল পূর্ণ, মে আংশিক ৩০০)
      {id:'p1',bookingId:'br1',bookingType:'room',propertyId:'pA',unitNumber:'১০১',tenantName:'রহিম উদ্দিন',mobile:'8801711000001',amount:1000,method:'ক্যাশ',notes:'',receiptNo:'INV-1000001',allocations:[],createdAt:now-35*day,createdBy:'admin',createdByName:'অ্যাডমিন',deleted:false},
      {id:'p2',bookingId:'br1',bookingType:'room',propertyId:'pA',unitNumber:'১০১',tenantName:'রহিম উদ্দিন',mobile:'8801711000001',amount:300,method:'ব্যাংক',notes:'',receiptNo:'INV-1000002',allocations:[],createdAt:now-5*day,createdBy:'admin',createdByName:'অ্যাডমিন',deleted:false},
      // করিম: ৪৫০ (মে পূর্ণ, জুন বাকি)
      {id:'p3',bookingId:'br2',bookingType:'room',propertyId:'pA',unitNumber:'১০২',tenantName:'করিম মিয়া',mobile:'8801711000002',amount:450,method:'ক্যাশ',notes:'',receiptNo:'INV-1000003',allocations:[],createdAt:now-15*day,createdBy:'admin',createdByName:'অ্যাডমিন',deleted:false},
      // সাবরিনা: ৩৬০০ (জানু–জুন পূর্ণ পরিশোধ)
      {id:'p4',bookingId:'br3',bookingType:'room',propertyId:'pB',unitNumber:'২০১',tenantName:'সাবরিনা আক্তার',mobile:'8801711000003',amount:3600,method:'ব্যাংক',notes:'৬ মাস একসাথে',receiptNo:'INV-1000004',allocations:[],createdAt:now-10*day,createdBy:'admin',createdByName:'অ্যাডমিন',deleted:false},
      // আলম স্টোর: ৩০০০ (১ম সাইকেল পূর্ণ, ২য় বাকি)
      {id:'p5',bookingId:'bs1',bookingType:'shop',unitNumber:'S1',tenantName:'আলম স্টোর',mobile:'8801711000010',amount:3000,method:'ব্যাংক',notes:'',receiptNo:'INV-1000005',allocations:[],createdAt:now-45*day,createdBy:'admin',createdByName:'অ্যাডমিন',deleted:false},
      // নূর ফার্মেসি: ১০০০ আংশিক
      {id:'p6',bookingId:'bs2',bookingType:'shop',unitNumber:'S2',tenantName:'নূর ফার্মেসি',mobile:'8801711000011',amount:1000,method:'ক্যাশ',notes:'অগ্রিম আংশিক',receiptNo:'INV-1000006',allocations:[],createdAt:now-25*day,createdBy:'admin',createdByName:'অ্যাডমিন',deleted:false},
    ],
    expenses: [
      {id:'e1',category:'বিদ্যুৎ',amount:450,propertyId:'pA',date:new Date(now-3*day).toISOString().slice(0,10),notes:'জুন বিল',createdAt:now-3*day,createdBy:'admin',deleted:false},
      {id:'e2',category:'পানি',amount:120,propertyId:'pA',date:new Date(now-2*day).toISOString().slice(0,10),notes:'',createdAt:now-2*day,createdBy:'admin',deleted:false},
      {id:'e3',category:'বেতন',amount:800,propertyId:'pB',date:new Date(now-1*day).toISOString().slice(0,10),notes:'কেয়ারটেকার',createdAt:now-1*day,createdBy:'admin',deleted:false},
    ],
    users: [
      {id:'admin', name:'ডেমো অ্যাডমিন', email:'admin@demo.com', role:'admin', createdAt:now},
      {id:'recp',  name:'রিসেপশনিস্ট', email:'recp@demo.com',  role:'receptionist', createdAt:now},
    ],
    audit_logs: [
      {id:'a1',action:'বুকিং তৈরি',entity:'booking',detail:'১০১ · রহিম উদ্দিন',by:'admin',byName:'ডেমো অ্যাডমিন',at:now-40*day},
      {id:'a2',action:'পেমেন্ট তৈরি',entity:'payment',detail:'২০১ · ৩৬০০ রি. · INV-1000004',by:'admin',byName:'ডেমো অ্যাডমিন',at:now-10*day},
    ],
  };

  let idc = 1;
  const newId = () => 'id_' + (Date.now().toString(36)) + '_' + (idc++);
  const clone = o => JSON.parse(JSON.stringify(o));
  const wrapDoc = d => ({ id:d.id, exists:true, data:()=>{const c=clone(d);delete c.id;return c;} });

  // ---------- query object ----------
  function Query(coll){ this.coll=coll; this._where=[]; this._order=null; this._dir='asc'; this._limit=null; }
  Query.prototype.where=function(f,op,v){ this._where.push([f,op,v]); return this; };
  Query.prototype.orderBy=function(f,dir){ this._order=f; this._dir=dir||'asc'; return this; };
  Query.prototype.limit=function(n){ this._limit=n; return this; };
  Query.prototype._run=function(){
    let arr=(STORE[this.coll]||[]).slice();
    for(const [f,op,v] of this._where){ if(op==='==') arr=arr.filter(x=>x[f]===v); }
    if(this._order){ const f=this._order,dir=this._dir==='desc'?-1:1;
      arr.sort((a,b)=>{const av=a[f],bv=b[f]; if(av<bv)return -1*dir; if(av>bv)return 1*dir; return 0;}); }
    if(this._limit!=null) arr=arr.slice(0,this._limit);
    return arr;
  };
  Query.prototype.get=function(){ const arr=this._run(); return Promise.resolve({ docs:arr.map(wrapDoc), forEach:cb=>arr.map(wrapDoc).forEach(cb), size:arr.length, empty:arr.length===0 }); };
  Query.prototype.add=function(obj){ const id=newId(); STORE[this.coll].push({id,...clone(obj)}); return Promise.resolve({id}); };
  Query.prototype.doc=function(id){ return new DocRef(this.coll, id||newId()); };

  function DocRef(coll,id){ this.coll=coll; this.id=id; }
  DocRef.prototype.get=function(){ const d=(STORE[this.coll]||[]).find(x=>x.id===this.id); return Promise.resolve(d?wrapDoc(d):{id:this.id,exists:false,data:()=>null}); };
  DocRef.prototype.set=function(obj){ const i=(STORE[this.coll]||[]).findIndex(x=>x.id===this.id); const rec={id:this.id,...clone(obj)}; if(i>-1)STORE[this.coll][i]=rec; else STORE[this.coll].push(rec); return Promise.resolve(); };
  DocRef.prototype.update=function(obj){ const d=(STORE[this.coll]||[]).find(x=>x.id===this.id); if(d)Object.assign(d,clone(obj)); return Promise.resolve(); };

  function Batch(){ this.ops=[]; }
  Batch.prototype.set=function(ref,obj){ this.ops.push(()=>ref.set(obj)); return this; };
  Batch.prototype.update=function(ref,obj){ this.ops.push(()=>ref.update(obj)); return this; };
  Batch.prototype.commit=function(){ return Promise.all(this.ops.map(f=>f())); };

  const mockDb = { collection:name=>new Query(name), batch:()=>new Batch() };

  // ---------- auth mock ----------
  let _cb=null;
  const demoUser={ uid:'admin', email:'admin@demo.com' };
  const mockAuth = {
    currentUser: demoUser,                 // ডেমোতে সরাসরি অ্যাডমিন হিসেবে লগইন
    setPersistence:()=>Promise.resolve(),
    onAuthStateChanged:cb=>{ _cb=cb; setTimeout(()=>cb(mockAuth.currentUser),0); },
    signInWithEmailAndPassword:(email)=>{ mockAuth.currentUser={uid:'admin',email:email||'admin@demo.com'}; if(_cb)setTimeout(()=>_cb(mockAuth.currentUser),0); return Promise.resolve({user:mockAuth.currentUser}); },
    signOut:()=>{ mockAuth.currentUser=null; if(_cb)setTimeout(()=>_cb(null),0); return Promise.resolve(); },
  };

  // ---------- global firebase shim ----------
  window.firebase = {
    initializeApp:()=>{},
    firestore:()=>mockDb,
    auth:Object.assign(()=>mockAuth,{ Auth:{ Persistence:{ LOCAL:'local' } } }),
  };
  window.__DEMO__ = true;
})();

<script>
/* ============================================================
   ইনসাফ প্রপার্টি ম্যানেজার  —  app.js
   Single-file Firebase PWA logic (Spark plan, lazy due engine)
   ============================================================ */

/* ---------- 1. FIREBASE CONFIG (নিজের প্রজেক্টের তথ্য বসাও) ---------- */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

/* ---------- 2. STATE ---------- */
const S = {
  user:null, role:null, name:null,
  properties:[],          // {id,name}
  activeProp:'all',       // current building filter
  tab:'dashboard',
  cache:{rooms:[],shops:[],bRooms:[],bShops:[],payments:[],expenses:[]}
};
const EDIT_WINDOW = 24*60*60*1000; // receptionist 24h

/* ---------- 3. HELPERS ---------- */
const $  = s=>document.querySelector(s);
const $$ = s=>document.querySelectorAll(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

// Bengali numerals
const BN='০১২৩৪৫৬৭৮৯';
const bnum=n=>String(n).replace(/[0-9]/g,d=>BN[d]);
const money=n=>bnum((Math.round((+n||0)*100)/100).toLocaleString('en-US'))+' রি.';

const BN_MONTH=['জানু','ফেব্রু','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্ট','অক্টো','নভে','ডিসে'];
const BN_MONTH_FULL=['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];

function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

// year-month key helpers
function ym(d){return d.getFullYear()*12 + d.getMonth();}          // months since year 0
function ymToLabel(idx,full){const y=Math.floor(idx/12),m=idx%12;return (full?BN_MONTH_FULL:BN_MONTH)[m]+' '+bnum(y);}
function todayYM(){return ym(new Date());}
function parseDate(s){const d=new Date(s);return isNaN(d)?new Date():d;}

/* ============================================================
   4. DUE ENGINE  (lazy / on-read — কোনো charge ডকুমেন্ট জমা নেই)
   ============================================================ */

// ----- Room: প্রতি মাসে fixed rent, FIFO পুরোনো আগে শোধ -----
function roomDue(booking, paidTotal){
  const start=parseDate(booking.startDate);
  const startIdx=ym(start), nowIdx=todayYM();
  const rent=+booking.monthlyRent||0;
  const months=[];
  for(let i=startIdx;i<=nowIdx;i++) months.push({idx:i,charge:rent,paid:0,remain:rent});
  // FIFO allocation
  let pool=paidTotal;
  for(const m of months){
    if(pool<=0)break;
    const use=Math.min(pool,m.charge);
    m.paid=use; m.remain=m.charge-use; pool-=use;
  }
  const payable=months.reduce((s,m)=>s+m.charge,0);
  const advance=pool>0?pool:0; // overpaid
  return {months,payable,paid:paidTotal,remain:Math.max(0,payable-paidTotal),advance,nowIdx,kind:'room'};
}

// ----- Shop: cycle (N মাস) ভিত্তিক, FIFO -----
function shopDue(booking, paidTotal){
  const start=parseDate(booking.startDate);
  const startIdx=ym(start), nowIdx=todayYM();
  const N=Math.max(1,+booking.cycleMonths||1);
  const rent=+booking.cycleRent||0;
  const cycles=[];
  for(let c=startIdx;c<=nowIdx;c+=N){
    const endIdx=Math.min(c+N-1, c+N-1);
    cycles.push({idx:c,endIdx,charge:rent,paid:0,remain:rent});
  }
  let pool=paidTotal;
  for(const cy of cycles){
    if(pool<=0)break;
    const use=Math.min(pool,cy.charge);
    cy.paid=use; cy.remain=cy.charge-use; pool-=use;
  }
  const payable=cycles.reduce((s,c)=>s+c.charge,0);
  return {cycles,payable,paid:paidTotal,remain:Math.max(0,payable-paidTotal),advance:pool>0?pool:0,nowIdx,N,kind:'shop'};
}

function cycleLabel(cy,full){
  if(cy.idx===cy.endIdx) return ymToLabel(cy.idx,full);
  return ymToLabel(cy.idx,full)+'–'+ymToLabel(cy.endIdx,full);
}

// সব পেমেন্ট থেকে নির্দিষ্ট booking এর মোট পরিশোধ
function paidFor(bookingId){
  return S.cache.payments
    .filter(p=>p.bookingId===bookingId && !p.deleted)
    .reduce((s,p)=>s+(+p.amount||0),0);
}

// একটি booking এর পূর্ণ due হিসাব
function computeDue(b){
  const paid=paidFor(b.id);
  return b._type==='shop'? shopDue(b,paid): roomDue(b,paid);
}

/* ============================================================
   5. AUTH
   ============================================================ */
$('#li-btn').onclick=doLogin;
$('#li-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const email=$('#li-email').value.trim(), pass=$('#li-pass').value;
  const errEl=$('#li-err'); errEl.textContent='';
  if(!email||!pass){errEl.textContent='ইমেইল ও পাসওয়ার্ড দিন।';return;}
  $('#li-btn').textContent='লগইন হচ্ছে…';
  try{
    await auth.signInWithEmailAndPassword(email,pass);
  }catch(e){
    errEl.textContent='লগইন ব্যর্থ — ইমেইল/পাসওয়ার্ড ঠিক আছে কিনা দেখুন।';
    $('#li-btn').textContent='লগইন';
  }
}

auth.onAuthStateChanged(async u=>{
  if(!u){ $('#auth').style.display='flex'; $('#app').style.display='none'; return; }
  // ইউজার প্রোফাইল লোড (role)
  let prof;
  try{ const d=await db.collection('users').doc(u.uid).get(); prof=d.exists?d.data():null; }catch(e){ prof=null; }
  if(!prof){
    // প্রথম ইউজার → admin বানিয়ে দাও
    prof={name:u.email.split('@')[0],email:u.email,role:'admin'};
    try{ await db.collection('users').doc(u.uid).set({...prof,createdAt:Date.now()}); }catch(e){}
  }
  S.user=u; S.role=prof.role||'receptionist'; S.name=prof.name||u.email;
  $('#who-name').textContent=S.name;
  $('#who-role').textContent=S.role==='admin'?'অ্যাডমিন':'রিসেপশনিস্ট';
  $('#auth').style.display='none'; $('#app').style.display='block';
  $('#li-btn').textContent='লগইন';
  await bootData();
  go('dashboard');
});

/* ============================================================
   6. DATA BOOTSTRAP  (একবার লোড, লোকাল ক্যাশ — কম রিড)
   ============================================================ */
async function bootData(){
  const [props,rooms,shops,bRooms,bShops] = await Promise.all([
    db.collection('properties').orderBy('name').get(),
    db.collection('rooms').get(),
    db.collection('shops').get(),
    db.collection('bookings_rooms').where('status','==','active').get(),
    db.collection('bookings_shops').where('status','==','active').get(),
  ]);
  S.properties = props.docs.map(d=>({id:d.id,...d.data()}));
  S.cache.rooms = rooms.docs.map(d=>({id:d.id,...d.data()}));
  S.cache.shops = shops.docs.map(d=>({id:d.id,...d.data()}));
  S.cache.bRooms= bRooms.docs.map(d=>({id:d.id,_type:'room',...d.data()}));
  S.cache.bShops= bShops.docs.map(d=>({id:d.id,_type:'shop',...d.data()}));
  await loadPayments();
  await loadExpenses();
  buildPills();
}
async function loadPayments(){
  const snap=await db.collection('payments').get();
  S.cache.payments=snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function loadExpenses(){
  const snap=await db.collection('expenses').orderBy('date','desc').limit(200).get();
  S.cache.expenses=snap.docs.map(d=>({id:d.id,...d.data()})).filter(e=>!e.deleted);
}

// active booking পেলে unit সহ
function activeBookings(){ return [...S.cache.bRooms,...S.cache.bShops]; }
function inProp(x){ return S.activeProp==='all' || x.propertyId===S.activeProp; }
function propName(id){ const p=S.properties.find(p=>p.id===id); return p?p.name:'—'; }

/* ---------- building selector (dropdown, জায়গা কম) ---------- */
function buildPills(){
  const box=$('#building-bar');
  // শুধু ড্যাশবোর্ড ও রুম-এ বিল্ডিং ফিল্টার; শপ সব একসাথে
  if(!['dashboard','rooms'].includes(S.tab) || S.properties.length===0){box.classList.add('hidden');return;}
  box.classList.remove('hidden');
  const opts=['<option value="all">🏢 সব বিল্ডিং</option>']
    .concat(S.properties.map(p=>`<option value="${p.id}" ${S.activeProp===p.id?'selected':''}>${esc(p.name)}</option>`)).join('');
  box.innerHTML=`<select id="prop-sel">${opts}</select>`;
  $('#prop-sel').value=S.activeProp;
  $('#prop-sel').onchange=e=>{ S.activeProp=e.target.value; render(); };
}

/* ---------- nav ---------- */
$$('.nav button').forEach(b=>b.onclick=()=>go(b.dataset.tab));
function go(tab){
  S.tab=tab;
  $$('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  const titles={dashboard:'ড্যাশবোর্ড',rooms:'রুম',shops:'শপ',payments:'পেমেন্ট'};
  $('#page-title').textContent=titles[tab]||'';
  buildPills();
  render();
}
// hamburger
document.addEventListener('click',e=>{ if(e.target&&e.target.id==='burger') openMenu(); });

/* ---------- audit log ---------- */
async function audit(action,entity,detail){
  try{ await db.collection('audit_logs').add({action,entity,detail:detail||'',by:S.user.uid,byName:S.name,at:Date.now()}); }catch(e){}
}

// receptionist 24h edit check
function canEdit(createdAt){
  if(S.role==='admin') return true;
  return (Date.now()-(+createdAt||0)) < EDIT_WINDOW;
}

/* ============================================================
   7. RENDER DISPATCH
   ============================================================ */
function render(){
  const v=$('#view');
  $('#fab').classList.add('hidden');
  if(S.tab==='dashboard') return renderDashboard(v);
  if(S.tab==='rooms')      return renderUnits(v,'room');
  if(S.tab==='shops')      return renderUnits(v,'shop');
  if(S.tab==='payments')   return renderPayments(v);
}

/* ============================================================
   8. DASHBOARD  (combined overview)
   ============================================================ */
function renderDashboard(v){
  const allView = S.activeProp==='all';
  const rooms=S.cache.rooms.filter(inProp);
  const bRooms=S.cache.bRooms.filter(inProp);
  const shops= allView ? S.cache.shops : [];      // শপ শুধু সম্মিলিত (সব বিল্ডিং) ভিউয়ে
  const bShops= allView ? S.cache.bShops : [];

  const roomOcc=new Set(bRooms.map(b=>b.unitId));
  const shopOcc=new Set(bShops.map(b=>b.unitId));
  const roomVac=rooms.filter(r=>!roomOcc.has(r.id)).length;
  const shopVac=shops.filter(s=>!shopOcc.has(s.id)).length;

  // collection this month + total due + expected this month
  const nowIdx=todayYM();
  let monthColl=0, totalDue=0, expectMonth=0;
  // এ মাসে পাওয়ার কথা: ভাড়াকৃত রুমের মাসিক ভাড়া
  bRooms.forEach(b=>{ if(ym(parseDate(b.startDate))<=nowIdx) expectMonth+=(+b.monthlyRent||0); });
  // + যে শপের নতুন সাইকেল ঠিক এই মাসে শুরু হয়
  bShops.forEach(b=>{ const sIdx=ym(parseDate(b.startDate)); const N=Math.max(1,+b.cycleMonths||1);
    if(nowIdx>=sIdx && (nowIdx-sIdx)%N===0) expectMonth+=(+b.cycleRent||0); });
  S.cache.payments.filter(p=>!p.deleted && inProp(p)).forEach(p=>{
    const d=new Date(p.createdAt); if(ym(d)===nowIdx) monthColl+=(+p.amount||0);
  });
  const dueUnits=[];
  [...bRooms,...bShops].forEach(b=>{
    const due=computeDue(b);
    if(due.remain>0){ totalDue+=due.remain; dueUnits.push({b,remain:due.remain}); }
  });

  // expenses + profit (this month)
  let monthExp=0;
  S.cache.expenses.filter(e=>inProp(e)).forEach(e=>{ const d=new Date(e.date); if(ym(d)===nowIdx) monthExp+=(+e.amount||0); });
  const profit=monthColl-monthExp;

  v.innerHTML='';
  const head=el('div','',`<div style="font-size:12.5px;color:var(--muted);margin:2px 4px 12px">${esc(S.activeProp==='all'?'সব বিল্ডিং একত্রে':propName(S.activeProp))} · ${ymToLabel(nowIdx,true)}</div>`);
  v.appendChild(head);

  // ----- hero: এ মাসে পাওয়ার কথা + কালেকশন প্রোগ্রেস -----
  const pct = expectMonth>0 ? Math.min(100,Math.round(monthColl/expectMonth*100)) : 0;
  const hero=el('div','hero');
  hero.innerHTML=`
    <div class="h-lbl">এ মাসে পাওয়ার কথা</div>
    <div class="h-big">${money(expectMonth)}</div>
    <div class="prog"><i style="width:${pct}%"></i></div>
    <div class="h-foot">
      <span>আদায় <b class="g">${money(monthColl)}</b> (${bnum(pct)}%)</span>
      <span>মোট বকেয়া <b class="r">${money(totalDue)}</b></span>
    </div>`;
  v.appendChild(hero);

  // ----- occupancy bars -----
  const roomTot=rooms.length, roomFull=rooms.length-roomVac;
  const shopTot=shops.length, shopFull=shops.length-shopVac;
  const occ=el('div','occ');
  occ.innerHTML=`
    <div class="ob r"><div class="t">🛏️ রুম <b>${bnum(roomFull)}/${bnum(roomTot)}</b></div>
      <div class="bar"><i style="width:${roomTot?roomFull/roomTot*100:0}%"></i></div>
      <div class="sub">${bnum(roomVac)} টি খালি</div></div>
    ${allView?`<div class="ob s"><div class="t">🏬 শপ <b>${bnum(shopFull)}/${bnum(shopTot)}</b></div>
      <div class="bar"><i style="width:${shopTot?shopFull/shopTot*100:0}%"></i></div>
      <div class="sub">${bnum(shopVac)} টি খালি</div></div>`:''}`;
  v.appendChild(occ);

  // ----- money stats -----
  v.appendChild(el('div','sec-title','এ মাসের হিসাব'));
  const grid=el('div','grid2');
  const stat=(lbl,val,cls)=>`<div class="stat ${cls||''}"><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`;
  grid.innerHTML=
    stat('কালেকশন',money(monthColl),'s-green')+
    stat('খরচ',money(monthExp),'s-orange')+
    stat('লাভ',money(profit),profit>=0?'s-blue':'s-red')+
    stat('বকেয়া',money(totalDue),'s-red');
  v.appendChild(grid);
  v.appendChild(el('div','sec-title','বকেয়া ইউনিট'));
  const dc=el('div','card');
  if(dueUnits.length===0){ dc.innerHTML='<div class="empty"><div class="big">✓</div>কোনো বকেয়া নেই</div>'; }
  else{
    dueUnits.sort((a,b)=>b.remain-a.remain).slice(0,8).forEach(({b,remain})=>{
      const r=el('div','row');
      r.innerHTML=`<div class="av">${b._type==='shop'?'🏬':'🛏️'}</div>

        <div class="end"><span class="amt red">${money(remain)}</span></div>`;
      r.onclick=()=>{go('payments');setTimeout(()=>openTenant(b),60);};
      dc.appendChild(r);
    });

  v.appendChild(dc);

  // vacant quick list
  v.appendChild(el('div','sec-title','খালি ইউনিট'));
  const vc=el('div','card');
  const vacR=rooms.filter(r=>!roomOcc.has(r.id));
  const vacS=shops.filter(s=>!shopOcc.has(s.id));
  if(vacR.length+vacS.length===0){ vc.innerHTML='<div class="empty">কোনো খালি ইউনিট নেই</div>'; }
  else{
    [...vacR.map(x=>({x,t:'room'})),...vacS.map(x=>({x,t:'shop'}))].slice(0,12).forEach(({x,t})=>{
      const r=el('div','row');
      r.innerHTML=`<div class="av">${t==='shop'?'🏬':'🛏️'}</div>
        <div class="main"><div class="n">${esc(x.number)}</div><div class="s">${t==='shop'?'শপ':esc(propName(x.propertyId))}</div></div>
        <div class="end"><span class="tag vac">খালি</span></div>`;
      vc.appendChild(r);
    });
  }
  v.appendChild(vc);
}

  $('#fab').classList.remove('hidden');

  v.innerHTML='';

      const rentTxt = b._type==='shop' ? money(b.cycleRent)+' / '+bnum(b.cycleMonths)+'মা' : money(b.monthlyRent)+'/মা';
      const sub = b._type==='shop' ? 'ভাড়া '+rentTxt : 'ভাড়া '+rentTxt+' · '+esc(propName(u.propertyId));
      r.innerHTML=`<div class="av">${esc(u.number)}</div>

      r.onclick=()=>openTenant(b);

      r.innerHTML=`<div class="av" style="background:#e9f7ef;color:var(--ok)">${esc(u.number)}</div>

  if(nVac===0)cVac.innerHTML+='<div class="empty">সব ভাড়া হয়ে গেছে</div>'; else cVac.appendChild(vac);
  const cOcc=el('div','card'); cOcc.innerHTML=`<div class="sec-title" style="margin-top:0">ভাড়াকৃত (${bnum(nOcc)})</div>`;

function doSearch(q){

    const t=q.toLowerCase();

      String(b.unitNumber).toLowerCase().includes(t) ||

/* ---------- tenant detail + due breakdown ---------- */
function openTenant(b){
  const due=computeDue(b);
  const m=modal();
  let rows='';
  if(due.kind==='room'){
    const shown=due.months.filter(mo=>mo.remain>0 || mo.idx===due.nowIdx);
    if(shown.length===0) rows=`<div class="dr paid-row"><span class="m">সব মাস পরিশোধিত ✓</span><span>০ রি.</span></div>`;
    shown.forEach(mo=>{
      const isCur=mo.idx===due.nowIdx;
      const pd = mo.paid>0 && mo.remain>0 ? ` <span class="pd">(−${money(mo.paid)})</span>` : (mo.remain===0?' <span class="pd">✓</span>':'');
      rows+=`<div class="dr ${isCur?'cur':''} ${mo.remain===0?'paid-row':''}"><span class="m">${ymToLabel(mo.idx,true)}${pd}</span><span>${money(mo.remain)}</span></div>`;
    });
  }else{
    const isCurC=cy=>due.nowIdx>=cy.idx && due.nowIdx<=cy.endIdx;
    const shown=due.cycles.filter(cy=>cy.remain>0 || isCurC(cy));
    if(shown.length===0) rows=`<div class="dr paid-row"><span class="m">সব সাইকেল পরিশোধিত ✓</span><span>০ রি.</span></div>`;
    shown.forEach(cy=>{
      const isCur=isCurC(cy);
      const pd = cy.paid>0 && cy.remain>0 ? ` <span class="pd">(−${money(cy.paid)})</span>` : (cy.remain===0?' <span class="pd">✓</span>':'');
      rows+=`<div class="dr ${isCur?'cur':''} ${cy.remain===0?'paid-row':''}"><span class="m">${cycleLabel(cy,false)}${pd}</span><span>${money(cy.remain)}</span></div>`;
    });
  }
  const adv = due.advance>0?`<div class="dr paid-row"><span class="m">অগ্রিম জমা</span><span class="amt green">${money(due.advance)}</span></div>`:'';

  m.innerHTML=`
    <div class="handle"></div>
    <h3>${esc(b.unitNumber)} · ${esc(b.tenantName)}</h3>
    <div class="kv"><span class="k">${b._type==='shop'?'ধরন':'বিল্ডিং'}</span><span class="v">${b._type==='shop'?'শপ':esc(propName(b.propertyId))}</span></div>
    <div class="kv"><span class="k">মোবাইল</span><span class="v">${esc(b.mobile||'—')}</span></div>
    <div class="kv"><span class="k">ইকামা</span><span class="v">${esc(b.iqama||'—')}</span></div>
    <div class="kv"><span class="k">${b._type==='shop'?'সাইকেল ভাড়া':'মাসিক ভাড়া'}</span><span class="v">${money(b._type==='shop'?b.cycleRent:b.monthlyRent)}${b._type==='shop'?' / '+bnum(b.cycleMonths)+' মাস':''}</span></div>
    <div class="due-tbl">
      ${rows}
      <div class="dr"><span class="m">মোট পেআবল</span><span>${money(due.payable)}</span></div>
      <div class="dr paid-row"><span class="m">মোট পরিশোধ</span><span class="amt green">${money(due.paid)}</span></div>
      ${adv}
      <div class="dr tot"><span class="m">বাকি</span><span>${money(due.remain)}</span></div>
    </div>
    <div class="modal-row">
      <button class="btn btn-primary" id="t-pay">💳 পেমেন্ট নিন</button>
    </div>
    <div class="modal-row">
      <button class="btn btn-ghost btn-sm" id="t-copy" style="flex:1">📋 বুকিং কপি</button>
      <button class="btn btn-ghost btn-sm" id="t-hist" style="flex:1">পেমেন্ট হিস্টরি</button>
    </div>
    ${S.role==='admin'?'<div class="modal-row"><button class="btn btn-ghost btn-sm" id="t-end" style="flex:1;color:var(--err)">🚪 ইউনিট খালি করুন</button></div>':''}`;
  $('#t-pay').onclick=()=>openReceive(b,due);

      <button class="btn btn-ghost" id="rc-cancel">বাতিল</button>
      <button class="btn btn-primary" id="rc-save">সেভ ও রিসিট</button>
    </div>`;

async function savePayment(b,due){
  const amt=+$('#rc-amt').value;
  if(!amt||amt<=0){toast('পরিমাণ দিন');return;}
  $('#rc-save').textContent='সেভ হচ্ছে…';
  const receiptNo='INV-'+Date.now().toString().slice(-7);
  // FIFO allocation labels (পেমেন্ট কোন কোন মাস/সাইকেল কভার করল)
  const allocs=[]; let pool=amt;
  const items = due.kind==='room'?due.months:due.cycles;
  for(const it of items){
    if(pool<=0)break;
    if(it.remain<=0)continue;
    const use=Math.min(pool,it.remain);
    allocs.push({label: due.kind==='room'?ymToLabel(it.idx,true):cycleLabel(it,true), amount:use});
    pool-=use;
  }
  if(pool>0) allocs.push({label:'অগ্রিম জমা',amount:pool});
  const pay={
    bookingId:b.id, bookingType:b._type, propertyId:b.propertyId,
    unitNumber:b.unitNumber, tenantName:b.tenantName, mobile:b.mobile||'',
    amount:amt, method:$('#rc-method').value, notes:$('#rc-note').value.trim(),
    receiptNo, allocations:allocs, createdAt:Date.now(), createdBy:S.user.uid, createdByName:S.name, deleted:false
  };
  try{
    const ref=await db.collection('payments').add(pay);
    pay.id=ref.id; S.cache.payments.push(pay);
    await audit('পেমেন্ট তৈরি','payment',`${b.unitNumber} · ${money(amt)} · ${receiptNo}`);
    closeModal();
    showReceipt(b,pay);
    toast('পেমেন্ট সেভ হয়েছে');
  }catch(e){ toast('সেভ ব্যর্থ'); $('#rc-save').textContent='সেভ ও রিসিট'; }
}

// jsPDF lazy load → PDF from receipt HTML via html2canvas
let _libsLoaded=false;
function loadPdfLibs(){
  if(_libsLoaded) return Promise.resolve();
  const add=src=>new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  return add('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js')
    .then(()=>add('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'))
    .then(()=>{_libsLoaded=true;});
}
async function makePDF(html,name){
  toast('PDF তৈরি হচ্ছে…');
  await loadPdfLibs();
  const holder=el('div');
  holder.style.cssText='position:fixed;left:-9999px;top:0;width:380px;background:#fff';
  holder.innerHTML=html; document.body.appendChild(holder);
  const canvas=await html2canvas(holder.firstElementChild,{scale:2,backgroundColor:'#fff'});
  document.body.removeChild(holder);
  const img=canvas.toDataURL('image/jpeg',0.95);
  const imgW=canvas.width, imgH=canvas.height;
  const orient = imgW>=imgH?'l':'p';                 // aspect থেকে orientation (Guest Voucher bug lesson)
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:orient,unit:'pt',format:[imgW*0.75,imgH*0.75]});
  pdf.addImage(img,'JPEG',0,0,imgW*0.75,imgH*0.75);
  pdf.save((name||'receipt')+'.pdf');
}

async function delPayment(id,b){

async function saveBooking(type){
  const unitId=$('#bk-unit').value;
  const name=$('#bk-name').value.trim();
  const rent=+$('#bk-rent').value;
  if(!unitId){toast('ইউনিট নির্বাচন করুন');return;}
  if(!name){toast('নাম দিন');return;}
  if(!rent||rent<=0){toast('ভাড়া দিন');return;}
  const units=type==='room'?S.cache.rooms:S.cache.shops;
  const unit=units.find(u=>u.id===unitId);
  $('#bk-save').textContent='সেভ হচ্ছে…';
  const base={
    propertyId:unit.propertyId, unitId, unitNumber:unit.number,
    tenantName:name, mobile:$('#bk-mobile').value.trim(), iqama:$('#bk-iqama').value.trim(),
    startDate:$('#bk-start').value, notes:$('#bk-note').value.trim(),
    status:'active', createdAt:Date.now(), createdBy:S.user.uid
  };
  let doc, coll, cacheArr, _type;
  if(type==='room'){ doc={...base,monthlyRent:rent}; coll='bookings_rooms'; cacheArr=S.cache.bRooms; _type='room'; }
  else{ doc={...base,cycleRent:rent,cycleMonths:+$('#bk-cycle').value}; coll='bookings_shops'; cacheArr=S.cache.bShops; _type='shop'; }
  try{
    const ref=await db.collection(coll).add(doc);
    const nb={id:ref.id,_type,...doc};
    cacheArr.push(nb);
    await audit('বুকিং তৈরি','booking',`${unit.number} · ${name}`);
    closeModal(); render(); buildPills();
    showBookingCopy(nb);
  }catch(e){toast('ব্যর্থ');$('#bk-save').textContent='বুকিং সেভ';}
}

async function saveUnits(type){
  const pid = type==='room' ? $('#um-prop').value : null;
  const nums=$('#um-nums').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(type==='room' && !pid){toast('বিল্ডিং নির্বাচন করুন');return;}
  if(nums.length===0){toast('নম্বর দিন');return;}
  $('#um-save').textContent='যোগ হচ্ছে…';
  const coll=type==='room'?'rooms':'shops';
  const cacheArr=type==='room'?S.cache.rooms:S.cache.shops;
  const batch=db.batch();
  const added=[];
  nums.forEach(n=>{
    const ref=db.collection(coll).doc();
    const doc = type==='room' ? {propertyId:pid,number:n,createdAt:Date.now()} : {number:n,createdAt:Date.now()};
    batch.set(ref,doc); added.push({id:ref.id,...doc});
  });
  try{
    await batch.commit();
    cacheArr.push(...added);
    await audit(type==='room'?'রুম যোগ':'শপ যোগ','unit',`${nums.length} টি${pid?' · '+propName(pid):''}`);
    closeModal(); render(); toast(`${bnum(nums.length)} টি যোগ হয়েছে`);
  }catch(e){toast('ব্যর্থ');$('#um-save').textContent='যোগ করুন';}
}

  // profit (এ মাস)
  const nowIdx=todayYM(); let inc=0,exp=0;
  S.cache.payments.filter(p=>!p.deleted).forEach(p=>{if(ym(new Date(p.createdAt))===nowIdx)inc+=(+p.amount||0);});
  S.cache.expenses.forEach(e=>{if(ym(new Date(e.date))===nowIdx)exp+=(+e.amount||0);});
  const row=(k,v,c)=>`<tr><td style="padding:5px 0;color:#6b7785">${k}</td><td style="text-align:right;font-weight:600;${c?`color:${c}`:''}">${v}</td></tr>`;
  const sec=t=>`<div style="font-weight:700;color:#16365f;font-family:Sora;margin:14px 0 4px;border-bottom:2px solid #16365f;padding-bottom:3px">${t}</div>`;
  const d=new Date();
  return `<div style="font-family:'Hind Siliguri',sans-serif;padding:20px;max-width:400px;color:#1e1e1e;background:#fff">
    <div style="text-align:center;margin-bottom:6px"><div style="font-family:Sora;font-weight:700;font-size:18px;color:#16365f">ইনসাফ প্রপার্টি — রিপোর্ট</div>
    <div style="font-size:11px;color:#6b7785">${bnum(d.getDate())} ${BN_MONTH_FULL[d.getMonth()]} ${bnum(d.getFullYear())}</div></div>
    ${sec('১) ইউনিট স্ট্যাটাস')}<table style="width:100%;font-size:13px;border-collapse:collapse">
      ${row('মোট রুম',bnum(rooms.length))}${row('রুম — ভাড়াকৃত',bnum(rooms.filter(r=>roomOcc.has(r.id)).length))}
      ${row('রুম — খালি',bnum(rooms.filter(r=>!roomOcc.has(r.id)).length),'#1f9d61')}
      ${row('মোট শপ',bnum(shops.length))}${row('শপ — ভাড়াকৃত',bnum(shops.filter(s=>shopOcc.has(s.id)).length))}
      ${row('শপ — খালি',bnum(shops.filter(s=>!shopOcc.has(s.id)).length),'#1f9d61')}</table>
    ${sec('২) কালেকশন (সর্বমোট)')}<table style="width:100%;font-size:13px;border-collapse:collapse">
      ${row('প্রত্যাশিত ভাড়া',money(payable))}${row('আদায়কৃত',money(paid),'#1f9d61')}${row('বকেয়া',money(Math.max(0,payable-paid)),'#d64545')}</table>
    ${sec('৩) লাভ ('+ymToLabel(nowIdx,true)+')')}<table style="width:100%;font-size:13px;border-collapse:collapse">
      ${row('আয় (কালেকশন)',money(inc),'#1f9d61')}${row('খরচ',money(exp),'#d64545')}${row('নিট লাভ',money(inc-exp),inc-exp>=0?'#16365f':'#d64545')}</table>
  </div>`;
}

/* ---------- Booking Register (বিল্ডিংভিত্তিক টেবিল, প্রিন্ট) ---------- */
function openRegister(){
  const m=modal();
  const opts=S.properties.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')+'<option value="__shops">সব শপ</option>';
  m.innerHTML=`<div class="handle"></div><h3>🧾 বুকিং রেজিস্টার</h3>
    <div class="field"><label>বিল্ডিং / শপ</label><select id="reg-sel">${opts}</select></div>
    <div id="reg-body" style="overflow-x:auto"></div>
    <div class="modal-row">
      <button class="btn btn-blue" id="reg-pdf">📄 PDF</button>
      <button class="btn btn-ghost" id="reg-print">প্রিন্ট</button>
    </div>
    <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:8px">বন্ধ</button>`;
  const draw=()=>{ const html=registerHTML($('#reg-sel').value);
    $('#reg-body').innerHTML=`<div style="border:1px solid var(--line);border-radius:10px;overflow:auto;margin-bottom:12px">${html}</div>`;
    $('#reg-pdf').onclick=()=>makePDF(html,'register');
    $('#reg-print').onclick=()=>{ $('#receipt-print').innerHTML=html; window.print(); };
  };
  $('#reg-sel').onchange=draw; draw();
}

function registerHTML(sel){
  const nowIdx=todayYM();
  const monthIdxs=[]; for(let i=nowIdx-5;i<=nowIdx;i++) monthIdxs.push(i);   // শেষ ৬ মাস
  const th='padding:7px 9px;font-size:11px;border:1px solid #d9e1ea;background:#16365f;color:#fff;white-space:nowrap';
  const td='padding:6px 9px;font-size:11.5px;border:1px solid #e4eaf1;white-space:nowrap';
  let title, list, isShop=sel==='__shops';
  if(isShop){ title='সব শপ'; list=S.cache.bShops.slice(); }
  else { title=propName(sel); list=S.cache.bRooms.filter(b=>b.propertyId===sel); }
  list.sort((a,b)=>String(a.unitNumber).localeCompare(String(b.unitNumber),undefined,{numeric:true}));

  const monthHead=monthIdxs.map(i=>`<th style="${th}">${ymToLabel(i,false)}</th>`).join('');
  let body='';
  if(list.length===0){ body=`<tr><td style="${td}" colspan="${monthIdxs.length+3}">কোনো বুকিং নেই</td></tr>`; }
  list.forEach(b=>{
    const due=computeDue(b);
    const cell=idx=>{
      if(due.kind==='room'){
        const mo=due.months.find(x=>x.idx===idx);
        if(!mo) return `<td style="${td};color:#bbb;text-align:center">—</td>`;
        return mo.remain===0
          ? `<td style="${td};text-align:center;color:#1f9d61;font-weight:700">✓</td>`
          : `<td style="${td};text-align:center;color:#d64545;font-weight:700">${bnum(mo.remain)}</td>`;
      }else{
        const cy=due.cycles.find(c=>idx>=c.idx && idx<=c.endIdx);
        if(!cy) return `<td style="${td};color:#bbb;text-align:center">—</td>`;
        return cy.remain===0
          ? `<td style="${td};text-align:center;color:#1f9d61;font-weight:700">✓</td>`
          : `<td style="${td};text-align:center;color:#d64545;font-weight:700">${bnum(cy.remain)}</td>`;
      }
    };
    const rent = isShop ? money(b.cycleRent)+'/'+bnum(b.cycleMonths)+'মা' : money(b.monthlyRent);
    body+=`<tr><td style="${td};font-weight:700">${esc(b.unitNumber)}</td>
      <td style="${td}">${esc(b.tenantName)}</td>
      <td style="${td};text-align:right">${rent}</td>
      ${monthIdxs.map(cell).join('')}</tr>`;
  });
  const d=new Date();
  return `<div style="font-family:'Hind Siliguri',sans-serif;padding:16px;background:#fff;color:#1e1e1e;min-width:560px">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">
      <div><div style="font-family:Sora;font-weight:700;font-size:17px;color:#16365f">ইনসাফ প্রপার্টি — বুকিং রেজিস্টার</div>
      <div style="font-size:12px;color:#6b7785">${esc(title)}</div></div>
      <div style="font-size:11px;color:#6b7785">${bnum(d.getDate())}/${bnum(d.getMonth()+1)}/${bnum(d.getFullYear())}</div></div>
    <table style="border-collapse:collapse;width:100%">
      <thead><tr><th style="${th}">${isShop?'শপ':'রুম'}</th><th style="${th}">নাম</th><th style="${th}">${isShop?'সাইকেল ভাড়া':'মাসিক ভাড়া'}</th>${monthHead}</tr></thead>
      <tbody>${body}</tbody>
    </table>
    <div style="font-size:10.5px;color:#6b7785;margin-top:8px">✓ = ঐ মাস পরিশোধিত · লাল সংখ্যা = ঐ মাসের বকেয়া · — = প্রযোজ্য নয়</div>
  </div>`;
}

/* ---------- Buildings ---------- */
function openProps(){
  const m=modal();
  let list=S.properties.map(p=>{
    const rc=S.cache.rooms.filter(r=>r.propertyId===p.id).length;
    return `<div class="row"><div class="av">🏢</div><div class="main"><div class="n">${esc(p.name)}</div>
      <div class="s">${bnum(rc)} টি রুম</div></div></div>`;
  }).join('')||'<div class="empty">কোনো বিল্ডিং নেই</div>';
  m.innerHTML=`<div class="handle"></div><h3>🏢 বিল্ডিং</h3>
    <div class="field"><label>নতুন বিল্ডিংয়ের নাম</label><input id="pr-name" placeholder="যেমন: ইনসাফ টাওয়ার"></div>

    <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:10px">বন্ধ</button>`;
  $('#pr-save').onclick=async()=>{
    const name=$('#pr-name').value.trim(); if(!name){toast('নাম দিন');return;}
    $('#pr-save').textContent='যোগ হচ্ছে…';
    try{ const ref=await db.collection('properties').add({name,createdAt:Date.now()});
      S.properties.push({id:ref.id,name}); S.properties.sort((a,b)=>a.name.localeCompare(b.name));
      await audit('বিল্ডিং যোগ','property',name); buildPills(); openProps(); toast('যোগ হয়েছে');
    }catch(e){toast('ব্যর্থ');}
  };
}

/* ---------- Audit log ---------- */
async function openAudit(){
  const m=modal();

  let list=snap.docs.map(d=>{const a=d.data();const dt=new Date(a.at);

      <div class="end"><div class="s">${bnum(dt.getDate())}/${bnum(dt.getMonth()+1)} ${bnum(dt.getHours())}:${String(dt.getMinutes()).padStart(2,'0').replace(/[0-9]/g,x=>BN[x])}</div></div></div>`;
  }).join('')||'<div class="empty">কোনো লগ নেই</div>';
  m.innerHTML=`<div class="handle"></div><h3>📋 অডিট লগ</h3><div class="card" style="box-shadow:none;padding:0">${list}</div>
    <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:10px">বন্ধ</button>`;
}

/* ============================================================
   15. MODAL + BACK BUTTON
   ============================================================ */
function modal(){
  const root=$('#modal-root');
  root.innerHTML='';
  const bg=el('div','modal-bg'); const mo=el('div','modal');
  bg.appendChild(mo); root.appendChild(bg);
  bg.onclick=e=>{ if(e.target===bg) closeModal(); };
  try{ history.pushState({modal:true},''); }catch(e){}
  return mo;
}
function closeModal(){ $('#modal-root').innerHTML=''; try{ if(history.state&&history.state.modal) history.back(); }catch(e){} }
window.addEventListener('popstate',()=>{ if($('#modal-root').innerHTML) $('#modal-root').innerHTML=''; });
window.closeModal=closeModal;
