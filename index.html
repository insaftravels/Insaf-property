<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#16365f" />
<title>ইনসাফ প্রপার্টি ম্যানেজার</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#16365f; --blue-d:#0f2746; --blue-l:#1f4a7a; --teal:#1a8fb8; --teal-d:#147a9c;
  --orange:#f47920; --orange-d:#d9650f;
  --bg:#eef2f7; --card:#ffffff; --ink:#16202b; --muted:#6b7785;
  --line:#e4eaf1; --err:#d64545; --ok:#1f9d61;
  --r:16px; --rs:11px;
  --sh:0 1px 2px rgba(20,40,70,.06),0 6px 20px rgba(20,40,70,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Hind Siliguri',system-ui,sans-serif;
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
}
h1,h2,h3,.num{font-family:'Sora','Hind Siliguri',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:15px}
.hidden{display:none!important}

/* ---------- Auth screen ---------- */
#auth{min-height:100dvh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--blue) 0%,var(--blue-d) 60%,#0a1d36 100%);padding:24px}
.auth-card{background:var(--card);border-radius:18px;padding:30px 24px;width:100%;max-width:360px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.brand{text-align:center;margin-bottom:22px}
.brand .logo{width:62px;height:62px;border-radius:16px;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;
  color:#fff;font-family:'Sora';font-weight:700;font-size:26px;box-shadow:var(--sh)}
.brand .logo-img{width:110px;height:110px;object-fit:contain;margin:0 auto 6px;display:block}
.brand h1{font-size:20px;margin:0;color:var(--blue)}
.topbar .top-logo{width:30px;height:30px;object-fit:contain;flex:0 0 auto;
  background:#fff;border-radius:9px;padding:3px;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.brand h1{font-size:19px;margin:0;color:var(--blue)}
.brand p{margin:3px 0 0;font-size:12.5px;color:var(--muted)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:12px 13px;border:1.5px solid var(--line);
  border-radius:var(--rs);background:#fbfcfd;color:var(--ink);outline:none;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);background:#fff}
.btn{width:100%;padding:13px;border-radius:var(--rs);font-weight:700;font-size:15px;transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:7px}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:active{background:var(--orange-d)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:active{background:var(--blue-d)}
.btn-ghost{background:#eef2f6;color:var(--blue)}
.btn-sm{width:auto;padding:8px 14px;font-size:13px;border-radius:7px}
.btn-danger{background:var(--err);color:#fff}
.err-msg{color:var(--err);font-size:13px;text-align:center;margin-top:10px;min-height:18px}

/* ---------- App shell ---------- */
#app{display:none;min-height:100dvh;padding-bottom:104px}
.topbar{position:sticky;top:0;z-index:30;
  background:linear-gradient(120deg,var(--blue) 0%,var(--blue-l) 100%);color:#fff;
  padding:calc(env(safe-area-inset-top) + 14px) 16px 18px;display:flex;align-items:center;gap:12px;
  border-radius:0 0 20px 20px;box-shadow:0 6px 20px rgba(15,39,70,.22)}
.topbar .t-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--orange));
  display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:700;font-size:16px;flex:0 0 auto}
.topbar .t-burger{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.16);color:#fff;
  font-size:18px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.topbar .t-burger:active{background:rgba(255,255,255,.3)}
.topbar h2{font-size:17px;margin:0;flex:1;font-weight:600;letter-spacing:.2px}
.topbar .who{font-size:11px;opacity:.85;text-align:right;line-height:1.3}
.wrap{padding:16px;max-width:760px;margin:0 auto}

/* building dropdown bar */
.bbar{padding:14px 16px 0;max-width:760px;margin:0 auto}
.bbar select{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:var(--rs);
  background:#fff;color:var(--blue);font-weight:600;outline:none;font-size:14px;box-shadow:var(--sh)}
.bbar select:focus{border-color:var(--teal)}

/* dashboard hero (signature: collection progress) */
.hero{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-l) 70%,var(--teal-d) 135%);
  border-radius:var(--r);padding:18px;color:#fff;box-shadow:0 8px 24px rgba(15,39,70,.25);margin-bottom:14px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero .h-lbl{font-size:12px;opacity:.85;font-weight:600}
.hero .h-big{font-family:'Sora';font-weight:700;font-size:30px;margin:2px 0 14px;letter-spacing:.5px}
.hero .prog{height:9px;border-radius:6px;background:rgba(255,255,255,.18);overflow:hidden;margin-bottom:7px}
.hero .prog i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#ffd9a8,var(--orange));transition:width .5s}
.hero .h-foot{display:flex;justify-content:space-between;font-size:12.5px}
.hero .h-foot b{font-family:'Sora';font-weight:600}
.hero .h-foot .g{color:#9ff0c4} .hero .h-foot .r{color:#ffc2c2}
/* occupancy bars */
.occ{display:flex;gap:12px}
.occ .ob{flex:1;background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:15px;border:1px solid #eef2f7;position:relative;overflow:hidden}
.occ .ob.r{background:linear-gradient(160deg,#e9f1fb 0%,#f5f9fd 100%);border-color:#cfe0f3}
.occ .ob.s{background:linear-gradient(160deg,#fff3e6 0%,#fffaf4 100%);border-color:#ffe0c2}
.occ .ob .chip{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.occ .ob .chip svg{width:19px;height:19px;stroke:#fff}
.occ .ob.r .chip{background:linear-gradient(135deg,var(--blue),var(--blue-l))}
.occ .ob.s .chip{background:linear-gradient(135deg,var(--orange),var(--orange-d))}
.occ .ob .t{font-size:12px;color:var(--muted);font-weight:600}
.occ .ob .big{font-family:'Sora';font-weight:700;font-size:20px;color:var(--ink);margin:2px 0 9px}
.occ .ob .big small{font-size:12px;color:var(--muted);font-weight:500}
.occ .ob .bar{height:7px;border-radius:5px;background:#eef2f7;overflow:hidden}
.occ .ob .bar i{display:block;height:100%;border-radius:5px}
.occ .ob.r .bar i{background:linear-gradient(90deg,var(--teal),var(--blue))}
.occ .ob.s .bar i{background:linear-gradient(90deg,#ffd9a8,var(--orange))}
.occ .ob .sub{font-size:11px;color:var(--muted);margin-top:7px}

/* cards & grid */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:8px 16px;margin-bottom:14px;
  border:1px solid #eef2f7}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{background:linear-gradient(160deg,#ffffff 0%,#fbfcfe 100%);border-radius:var(--r);box-shadow:var(--sh);
  padding:16px;position:relative;overflow:hidden;border:1px solid #eef2f7}
.stat::after{content:"";position:absolute;right:-22px;bottom:-22px;width:72px;height:72px;border-radius:50%;
  background:currentColor;opacity:.05}
.stat .lbl{font-size:11.5px;color:var(--muted);font-weight:600}
.stat .lbl::before{content:none}
.stat .val{font-family:'Sora';font-weight:700;font-size:25px;margin-top:7px;color:var(--ink);letter-spacing:.3px;position:relative}
.stat .val small{font-size:12px;color:var(--muted);font-weight:500}
.stat::before{content:none}
.stat.s-blue{color:var(--blue)} .stat.s-green{color:var(--ok)} .stat.s-red{color:var(--err)} .stat.s-orange{color:var(--orange-d)}
.stat.s-blue .lbl,.stat.s-green .lbl,.stat.s-red .lbl,.stat.s-orange .lbl{color:var(--muted)}
.stat.s-blue .lbl::before{color:var(--blue)} .stat.s-green .lbl::before{color:var(--ok)}
.stat.s-red .lbl::before{color:var(--err)} .stat.s-orange .lbl::before{color:var(--orange)}
.stat.s-green{color:var(--ok);background:linear-gradient(160deg,#eafaf1 0%,#f4fcf8 100%);border-color:#cdeedd}
.stat.s-orange{color:var(--orange-d);background:linear-gradient(160deg,#fff3e6 0%,#fffaf4 100%);border-color:#ffe0c2}
.stat.s-blue{color:var(--blue);background:linear-gradient(160deg,#e9f1fb 0%,#f4f8fd 100%);border-color:#cfe0f3}
.stat.s-red{color:var(--err);background:linear-gradient(160deg,#fdeaea 0%,#fef5f5 100%);border-color:#f6cdcd}
.stat.s-blue .lbl,.stat.s-green .lbl,.stat.s-red .lbl,.stat.s-orange .lbl{color:var(--muted)}
.stat.s-green .val{color:#15784a} .stat.s-red .val{color:#b53636}
.stat.s-orange .val{color:var(--orange-d)} .stat.s-blue .val{color:var(--blue)}
/* stat with icon chip */
.stat .schip{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center}
.stat .schip svg{width:17px;height:17px;stroke:#fff}
.stat.s-green .schip{background:linear-gradient(135deg,#27b56e,var(--ok))}
.stat.s-orange .schip{background:linear-gradient(135deg,var(--orange),var(--orange-d))}
.stat.s-blue .schip{background:linear-gradient(135deg,var(--blue),var(--blue-l))}
.stat.s-red .schip{background:linear-gradient(135deg,#e85d5d,var(--err))}
.stat .lbl{padding-right:38px}
.sec-title{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--blue);
  margin:20px 0 11px;padding:7px 14px 7px 12px;background:#fff;border-radius:20px;box-shadow:var(--sh);
  border:1px solid var(--line)}
.sec-title::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--orange);flex:0 0 auto}

/* list rows */
.row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #f0f4f8}
.row:last-child{border-bottom:none}
.row .av{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#eaf2fb,#dbe8f5);color:var(--blue);
  display:flex;align-items:center;justify-content:center;font-weight:700;flex:0 0 auto;font-family:'Sora';font-size:14px;
  box-shadow:inset 0 0 0 1px rgba(22,54,95,.06)}
.row .main{flex:1;min-width:0}
.row .main .n{font-weight:600;font-size:14.5px;color:var(--ink)}
.row .main .s{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.row .end{text-align:right;flex:0 0 auto}
.tag{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700}
.tag.vac{background:#e7f6ee;color:var(--ok)} .tag.occ{background:#eef3f8;color:var(--blue)}
.tag.due{background:#fdeaea;color:var(--err)} .tag.paid{background:#e7f6ee;color:var(--ok)}
.tag.shop{background:#fff3e6;color:var(--orange-d)}
.amt{font-family:'Sora';font-weight:700} .amt.red{color:var(--err)} .amt.green{color:var(--ok)}
.empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:13.5px}
.empty .big{font-size:30px;margin-bottom:6px;opacity:.5}

/* bottom nav */
.nav{position:fixed;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 10px);z-index:40;
  background:linear-gradient(135deg,#16365f 0%,#1f4a7a 100%);border:none;border-radius:24px;display:flex;padding:10px 8px;
  box-shadow:0 14px 34px rgba(20,40,70,.34),0 2px 6px rgba(20,40,70,.14)}
.nav button{flex:1;padding:2px;display:flex;flex-direction:column;align-items:center;gap:6px;
  color:rgba(255,255,255,.92);font-size:11px;font-weight:700;transition:.2s;position:relative}
.nav button .ic{width:50px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:14px;
  transition:.22s;background:rgba(255,255,255,.12)}
.nav button .ic svg{width:24px;height:24px;transition:.22s;stroke-width:2}
/* inactive: প্রতি ট্যাব নিজ রঙে উজ্জ্বল */
.nav button[data-tab="dashboard"] .ic svg{stroke:#8fb6e6}
.nav button[data-tab="rooms"] .ic svg{stroke:#74d0e8}
.nav button[data-tab="shops"] .ic svg{stroke:#ffb066}
.nav button[data-tab="payments"] .ic svg{stroke:#7fe0a8}
/* active: সাদা চিপ + কাজভিত্তিক রঙের আইকন, একটু বড় */
.nav button.active .ic{background:#fff;box-shadow:0 6px 16px rgba(0,0,0,.3);transform:translateY(-2px) scale(1.06)}
.nav button.active{color:#fff}
.nav button[data-tab="dashboard"].active .ic svg{stroke:var(--blue)}
.nav button[data-tab="rooms"].active .ic svg{stroke:var(--teal)}
.nav button[data-tab="shops"].active .ic svg{stroke:var(--orange)}
.nav button[data-tab="payments"].active .ic svg{stroke:var(--ok)}
.nav button.active::before{content:"";position:absolute;top:-10px;width:22px;height:3px;border-radius:0 0 4px 4px;background:#fff}

/* segmented */
.seg{display:flex;background:#fff;border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:16px;
  gap:4px;box-shadow:var(--sh)}
.seg button{flex:1;padding:10px 4px 11px;border-radius:10px;font-weight:700;font-size:13.5px;color:var(--muted);
  position:relative;transition:.2s}
.seg button.active{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-l) 100%);color:#fff;
  box-shadow:0 4px 12px rgba(22,54,95,.32)}
.seg button.active::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:5px;
  width:16px;height:3px;border-radius:2px;background:var(--orange)}

/* search */
.search{display:flex;gap:8px;margin-bottom:14px}
.search input{flex:1;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--rs);background:#fff;outline:none}
.search input:focus{border-color:var(--teal)}

/* due breakdown table */
.due-tbl{border:1px solid var(--line);border-radius:var(--rs);overflow:hidden;margin:12px 0}
.due-tbl .dr{display:flex;justify-content:space-between;padding:10px 13px;font-size:14px;border-bottom:1px solid var(--line)}
.due-tbl .dr:last-child{border-bottom:none}
.due-tbl .dr.cur{background:#fff8f0} .due-tbl .dr.cur .m::after{content:" • চলতি";color:var(--orange);font-size:11px;font-weight:700}
.due-tbl .dr.tot{background:var(--blue);color:#fff;font-weight:700;font-family:'Sora'}
.due-tbl .dr.paid-row{background:#f3f8f4}
.due-tbl .dr .m{color:var(--ink)} .due-tbl .dr.tot .m{color:#fff}
.due-tbl .dr .pd{color:var(--ok);font-size:11px;font-weight:700}

/* modal */
.modal-bg{position:fixed;inset:0;z-index:60;background:rgba(15,25,45,.55);
  display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:92dvh;overflow-y:auto;
  padding:8px 18px calc(env(safe-area-inset-bottom) + 22px);animation:slideup .25s}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal .handle{width:40px;height:4px;background:#d5dde4;border-radius:3px;margin:8px auto 14px}
.modal h3{margin:0 0 14px;font-size:17px;color:var(--blue)}
.modal-row{display:flex;gap:10px;margin-top:6px}
.modal-row .btn{flex:1}
.kv{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px dashed var(--line)}
.kv .k{color:var(--muted)} .kv .v{font-weight:600}

/* fab */
.fab{position:fixed;right:18px;bottom:96px;z-index:35;width:54px;height:54px;border-radius:50%;
  background:var(--orange);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(244,121,32,.45)}
.fab:active{background:var(--orange-d)}

/* toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);z-index:80;
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;
  opacity:0;transition:.25s;pointer-events:none;max-width:90%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.3)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* spinner */
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;
  animation:rot .7s linear infinite;margin:30px auto}
@keyframes rot{to{transform:rotate(360deg)}}
.loading{display:flex;justify-content:center;padding:20px}

/* receipt (printable) — A4 */
#receipt-print{display:none}
@page{size:A4;margin:14mm}
@media print{
  html,body{background:#fff!important}
  body *{visibility:hidden}
  #receipt-print,#receipt-print *{visibility:visible}
  #receipt-print{display:block!important;position:absolute;left:0;top:0;width:100%;padding:0;margin:0}
  #receipt-print .a4{max-width:182mm;margin:0 auto}
}
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth">
  <div class="auth-card">
    <div class="brand">
      <img id="brand-logo" class="logo-img" alt="ইনসাফ প্রপার্টি" />
      <h1>ইনসাফ প্রপার্টি</h1>
      <p>প্রপার্টি ম্যানেজমেন্ট সিস্টেম</p>
    </div>
    <div class="field"><label>ইমেইল</label><input id="li-email" type="email" autocomplete="username" placeholder="you@example.com"></div>
    <div class="field"><label>পাসওয়ার্ড</label><input id="li-pass" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="btn btn-primary" id="li-btn">লগইন</button>
    <div class="err-msg" id="li-err"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="topbar">
    <button class="t-burger" id="burger" aria-label="মেনু">☰</button>
    <img id="top-logo" class="top-logo" alt="" />
    <h2 id="page-title">ড্যাশবোর্ড</h2>
    <div class="who"><div id="who-name">—</div><div id="who-role" style="opacity:.7"></div></div>
  </div>

  <div id="building-bar" class="bbar"></div>
  <div id="view" class="wrap"></div>

  <button class="fab hidden" id="fab">+</button>

  <nav class="nav">
    <button data-tab="dashboard" class="active"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.8V20h14V9.8"/><path d="M10 20v-5h4v5"/></svg></span>ড্যাশবোর্ড</button>

// Bengali numerals
const BN='০১২৩৪৫৬৭৮৯';
const bnum=n=>String(n).replace(/[0-9]/g,d=>BN[d]);
const money=n=>bnum((Math.round((+n||0)*100)/100).toLocaleString('en-US'))+' রি.';

const BN_MONTH=['জানু','ফেব্রু','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্ট','অক্টো','নভে','ডিসে'];
const BN_MONTH_FULL=['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];

function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

// year-month key helpers
function ym(d){return d.getFullYear()*12 + d.getMonth();}          // months since year 0
function ymToLabel(idx,full){const y=Math.floor(idx/12),m=idx%12;return (full?BN_MONTH_FULL:BN_MONTH)[m]+' '+bnum(y);}
function todayYM(){return ym(new Date());}
function parseDate(s){const d=new Date(s);return isNaN(d)?new Date():d;}

/* ============================================================
   4. DUE ENGINE  (lazy / on-read — কোনো charge ডকুমেন্ট জমা নেই)
   ============================================================ */

// ----- Room: প্রতি মাসে fixed rent, FIFO পুরোনো আগে শোধ -----
function roomDue(booking, paidTotal){
  const start=parseDate(booking.startDate);
  const startIdx=ym(start), nowIdx=todayYM();
  const rent=+booking.monthlyRent||0;
  const months=[];
  for(let i=startIdx;i<=nowIdx;i++) months.push({idx:i,charge:rent,paid:0,remain:rent});
  // FIFO allocation
  let pool=paidTotal;
  for(const m of months){
    if(pool<=0)break;
    const use=Math.min(pool,m.charge);
    m.paid=use; m.remain=m.charge-use; pool-=use;
  }
  const payable=months.reduce((s,m)=>s+m.charge,0);
  const advance=pool>0?pool:0; // overpaid
  return {months,payable,paid:paidTotal,remain:Math.max(0,payable-paidTotal),advance,nowIdx,kind:'room'};
}

// ----- Shop: cycle (N মাস) ভিত্তিক, FIFO -----
function shopDue(booking, paidTotal){
  const start=parseDate(booking.startDate);
  const startIdx=ym(start), nowIdx=todayYM();
  const N=Math.max(1,+booking.cycleMonths||1);
  const rent=+booking.cycleRent||0;
  const cycles=[];
  for(let c=startIdx;c<=nowIdx;c+=N){
    const endIdx=Math.min(c+N-1, c+N-1);
    cycles.push({idx:c,endIdx,charge:rent,paid:0,remain:rent});
  }
  let pool=paidTotal;
  for(const cy of cycles){
    if(pool<=0)break;
    const use=Math.min(pool,cy.charge);
    cy.paid=use; cy.remain=cy.charge-use; pool-=use;
  }
  const payable=cycles.reduce((s,c)=>s+c.charge,0);
  return {cycles,payable,paid:paidTotal,remain:Math.max(0,payable-paidTotal),advance:pool>0?pool:0,nowIdx,N,kind:'shop'};
}

function cycleLabel(cy,full){
  if(cy.idx===cy.endIdx) return ymToLabel(cy.idx,full);
  return ymToLabel(cy.idx,full)+'–'+ymToLabel(cy.endIdx,full);
}

// সব পেমেন্ট থেকে নির্দিষ্ট booking এর মোট পরিশোধ
function paidFor(bookingId){
  return S.cache.payments
    .filter(p=>p.bookingId===bookingId && !p.deleted)
    .reduce((s,p)=>s+(+p.amount||0),0);
}

// একটি booking এর পূর্ণ due হিসাব
function computeDue(b){
  const paid=paidFor(b.id);
  return b._type==='shop'? shopDue(b,paid): roomDue(b,paid);
}

/* একটি বুকিং-এর নির্দিষ্ট মাস-রেঞ্জে চার্জ (প্রত্যাশিত) ও ঐ রেঞ্জে আদায় */
function bookingRangeStat(b,fromIdx,toIdx){
  const s=ym(parseDate(b.startDate));
  let charge=0;
  if(b._type==='shop'){
    const N=Math.max(1,+b.cycleMonths||1), r=+b.cycleRent||0;
    for(let c=s;c<=toIdx;c+=N){ if(c>=fromIdx) charge+=r; }
  }else{
    const r=+b.monthlyRent||0;
    for(let i=Math.max(s,fromIdx);i<=toIdx;i++) charge+=r;
  }
  let paid=0;
  S.cache.payments.filter(p=>p.bookingId===b.id && !p.deleted).forEach(p=>{
    const i=ym(new Date(p.createdAt)); if(i>=fromIdx && i<=toIdx) paid+=(+p.amount||0);
  });
  return {charge, paid, due:Math.max(0,charge-paid)};
}

/* পিরিয়ড-ভিত্তিক হিসাব: [fromIdx..toIdx] মাস-রেঞ্জে প্রত্যাশিত ও আদায়।
   বাকি = ঐ রেঞ্জের প্রত্যাশিত − ঐ রেঞ্জে আদায় (একই পিরিয়ডের ভেতরে)। */
function periodStats(bRooms,bShops,payments,fromIdx,toIdx){
  let expected=0, collected=0;
  bRooms.forEach(b=>{
    const s=ym(parseDate(b.startDate)), r=+b.monthlyRent||0;
    for(let i=Math.max(s,fromIdx); i<=toIdx; i++) expected+=r;   // রেঞ্জের প্রতিটি প্রযোজ্য মাস
  });
  bShops.forEach(b=>{
    const s=ym(parseDate(b.startDate)), N=Math.max(1,+b.cycleMonths||1), r=+b.cycleRent||0;
    for(let c=s; c<=toIdx; c+=N){ if(c>=fromIdx) expected+=r; }   // রেঞ্জে যে সাইকেল শুরু হয়
  });
  payments.filter(p=>!p.deleted).forEach(p=>{
    const i=ym(new Date(p.createdAt));
    if(i>=fromIdx && i<=toIdx) collected+=(+p.amount||0);
  });
  return {expected, collected, due:Math.max(0,expected-collected)};
}

$('#li-btn').onclick=doLogin;

async function doLogin(){
  const email=$('#li-email').value.trim(), pass=$('#li-pass').value;
  const errEl=$('#li-err'); errEl.textContent='';
  if(!email||!pass){errEl.textContent='ইমেইল ও পাসওয়ার্ড দিন।';return;}
  $('#li-btn').textContent='লগইন হচ্ছে…';
  try{
    await auth.signInWithEmailAndPassword(email,pass);
  }catch(e){
    errEl.textContent='লগইন ব্যর্থ — ইমেইল/পাসওয়ার্ড ঠিক আছে কিনা দেখুন।';
    $('#li-btn').textContent='লগইন';
  }
}

auth.onAuthStateChanged(async u=>{
  if(!u){ $('#auth').style.display='flex'; $('#app').style.display='none'; return; }
  // ইউজার প্রোফাইল লোড (role)
  let prof;
  try{ const d=await db.collection('users').doc(u.uid).get(); prof=d.exists?d.data():null; }catch(e){ prof=null; }
  if(!prof){
    // প্রথম ইউজার → admin বানিয়ে দাও
    prof={name:u.email.split('@')[0],email:u.email,role:'admin'};
    try{ await db.collection('users').doc(u.uid).set({...prof,createdAt:Date.now()}); }catch(e){}
  }
  S.user=u; S.role=prof.role||'receptionist'; S.name=prof.name||u.email;
  $('#who-name').textContent=S.name;
  $('#who-role').textContent=S.role==='admin'?'অ্যাডমিন':'রিসেপশনিস্ট';
  $('#auth').style.display='none'; $('#app').style.display='block';
  $('#li-btn').textContent='লগইন';
  await bootData();
  go('dashboard');
});

/* ============================================================
   6. DATA BOOTSTRAP  (একবার লোড, লোকাল ক্যাশ — কম রিড)
   ============================================================ */
async function bootData(){
  const [props,rooms,shops,bRooms,bShops] = await Promise.all([
    db.collection('properties').orderBy('name').get(),
    db.collection('rooms').get(),
    db.collection('shops').get(),
    db.collection('bookings_rooms').where('status','==','active').get(),
    db.collection('bookings_shops').where('status','==','active').get(),
  ]);
  S.properties = props.docs.map(d=>({id:d.id,...d.data()}));
  S.cache.rooms = rooms.docs.map(d=>({id:d.id,...d.data()}));
  S.cache.shops = shops.docs.map(d=>({id:d.id,...d.data()}));
  S.cache.bRooms= bRooms.docs.map(d=>({id:d.id,_type:'room',...d.data()}));
  S.cache.bShops= bShops.docs.map(d=>({id:d.id,_type:'shop',...d.data()}));
  await loadPayments();
  await loadExpenses();
  buildPills();
}
async function loadPayments(){
  const snap=await db.collection('payments').get();
  S.cache.payments=snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function loadExpenses(){
  const snap=await db.collection('expenses').orderBy('date','desc').limit(200).get();
  S.cache.expenses=snap.docs.map(d=>({id:d.id,...d.data()})).filter(e=>!e.deleted);
}

// active booking পেলে unit সহ
function activeBookings(){ return [...S.cache.bRooms,...S.cache.bShops]; }
function inProp(x){ return S.activeProp==='all' || x.propertyId===S.activeProp; }
function propName(id){ const p=S.properties.find(p=>p.id===id); return p?p.name:'—'; }

/* ---------- building selector (dropdown, জায়গা কম) ---------- */
function buildPills(){
  const box=$('#building-bar');
  // শুধু ড্যাশবোর্ড ও রুম-এ বিল্ডিং ফিল্টার; শপ সব একসাথে
  if(!['dashboard','rooms'].includes(S.tab) || S.properties.length===0){box.classList.add('hidden');return;}
  box.classList.remove('hidden');
  const opts=['<option value="all">🏢 সব বিল্ডিং</option>']
    .concat(S.properties.map(p=>`<option value="${p.id}" ${S.activeProp===p.id?'selected':''}>${esc(p.name)}</option>`)).join('');
  box.innerHTML=`<select id="prop-sel">${opts}</select>`;
  $('#prop-sel').value=S.activeProp;
  $('#prop-sel').onchange=e=>{ S.activeProp=e.target.value; render(); };
}

/* ---------- nav ---------- */
$$('.nav button').forEach(b=>b.onclick=()=>go(b.dataset.tab));
function go(tab){
  S.tab=tab;
  $$('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  const titles={dashboard:'ড্যাশবোর্ড',rooms:'রুম',shops:'শপ',payments:'পেমেন্ট'};
  $('#page-title').textContent=titles[tab]||'';
  buildPills();
  render();
}
// hamburger
document.addEventListener('click',e=>{ if(e.target&&e.target.id==='burger') openMenu(); });

/* ---------- audit log ---------- */
async function audit(action,entity,detail){
  try{ await db.collection('audit_logs').add({action,entity,detail:detail||'',by:S.user.uid,byName:S.name,at:Date.now()}); }catch(e){}
}

// receptionist 24h edit check
function canEdit(createdAt){
  if(S.role==='admin') return true;
  return (Date.now()-(+createdAt||0)) < EDIT_WINDOW;
}

/* ============================================================
   7. RENDER DISPATCH
   ============================================================ */
function render(){
  const v=$('#view');
  $('#fab').classList.add('hidden');
  if(S.tab==='dashboard') return renderDashboard(v);
  if(S.tab==='rooms')      return renderUnits(v,'room');
  if(S.tab==='shops')      return renderUnits(v,'shop');
  if(S.tab==='payments')   return renderPayments(v);
}

/* ============================================================
   8. DASHBOARD  (combined overview)
   ============================================================ */
function renderDashboard(v){
  const allView = S.activeProp==='all';
  const rooms=S.cache.rooms.filter(inProp);
  const bRooms=S.cache.bRooms.filter(inProp);
  const shops= allView ? S.cache.shops : [];      // শপ শুধু সম্মিলিত (সব বিল্ডিং) ভিউয়ে
  const bShops= allView ? S.cache.bShops : [];

  const roomOcc=new Set(bRooms.map(b=>b.unitId));
  const shopOcc=new Set(bShops.map(b=>b.unitId));
  const roomVac=rooms.filter(r=>!roomOcc.has(r.id)).length;
  const shopVac=shops.filter(s=>!shopOcc.has(s.id)).length;

  // ---- পিরিয়ড রেঞ্জ ----
  const nowIdx=todayYM();
  const periodFrom={month:nowIdx, '6m':nowIdx-5, '12m':nowIdx-11, all:0}[S.period];
  const periodLbl={month:'এ মাস', '6m':'৬ মাস', '12m':'১২ মাস', all:'সব সময়'}[S.period];
  // রুম বিল্ডিং-ফিল্টার মানে; শপ শুধু all-view তে
  const ps=periodStats(bRooms, bShops, S.cache.payments.filter(inProp), periodFrom, nowIdx);
  // খরচ (ঐ পিরিয়ডে)
  let periodExp=0;
  S.cache.expenses.filter(e=>inProp(e)).forEach(e=>{ const i=ym(new Date(e.date)); if(i>=periodFrom && i<=nowIdx) periodExp+=(+e.amount||0); });
  const profit=ps.collected-periodExp;

  v.innerHTML='';
  const head=el('div','',`<div style="font-size:12.5px;color:var(--muted);margin:2px 4px 10px">${esc(allView?'সব বিল্ডিং একত্রে':propName(S.activeProp))}</div>`);
  v.appendChild(head);

  // ---- পিরিয়ড সিলেক্টর ----
  const segP=el('div','seg');
  [['month','এ মাস'],['6m','৬ মাস'],['12m','১২ মাস'],['all','সব']].forEach(([k,lbl])=>{
    const btn=el('button',S.period===k?'active':'',lbl);
    btn.onclick=()=>{ S.period=k; render(); };
    segP.appendChild(btn);
  });
  v.appendChild(segP);

  // ---- hero: প্রত্যাশিত + কালেকশন প্রোগ্রেস (ঐ পিরিয়ডে) ----
  const pct = ps.expected>0 ? Math.min(100,Math.round(ps.collected/ps.expected*100)) : 0;
  const hero=el('div','hero');
  hero.innerHTML=`
    <div class="h-lbl">${periodLbl} — পাওয়ার কথা</div>
    <div class="h-big">${money(ps.expected)}</div>
    <div class="prog"><i style="width:${pct}%"></i></div>
    <div class="h-foot">
      <span>আদায় <b class="g">${money(ps.collected)}</b> (${bnum(pct)}%)</span>
      <span>বাকি <b class="r">${money(ps.due)}</b></span>
    </div>`;
  v.appendChild(hero);

  // ----- occupancy cards -----
  const roomTot=rooms.length, roomFull=rooms.length-roomVac;
  const shopTot=shops.length, shopFull=shops.length-shopVac;
  const bedIc='<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18V7M3 12h15a3 3 0 0 1 3 3v3"/><path d="M3 15h18"/><path d="M7 12v-2a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
  const shopIc='<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9.5 5.2 5h13.6L20 9.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9.5 20v-5h5v5"/></svg>';
  const occ=el('div','occ');
  occ.innerHTML=`
    <div class="ob r"><div class="chip">${bedIc}</div><div class="t">রুম</div>
      <div class="big">${bnum(roomFull)}<small>/${bnum(roomTot)} ভর্তি</small></div>
      <div class="bar"><i style="width:${roomTot?roomFull/roomTot*100:0}%"></i></div>
      <div class="sub">${bnum(roomVac)} টি খালি</div></div>
    ${allView?`<div class="ob s"><div class="chip">${shopIc}</div><div class="t">শপ</div>
      <div class="big">${bnum(shopFull)}<small>/${bnum(shopTot)} ভর্তি</small></div>
      <div class="bar"><i style="width:${shopTot?shopFull/shopTot*100:0}%"></i></div>
      <div class="sub">${bnum(shopVac)} টি খালি</div></div>`:''}`;
  v.appendChild(occ);

  // ----- money stats (ঐ পিরিয়ডে) -----
  v.appendChild(el('div','sec-title',periodLbl+' — হিসাব'));
  const ic={
    coll:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    exp:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
    profit:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 7-7"/><path d="M17 8h4v4"/></svg>',
    due:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>'
  };
  const grid=el('div','grid2');
  const stat=(lbl,val,cls,icon)=>`<div class="stat ${cls||''}"><div class="schip">${icon}</div><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`;
  grid.innerHTML=
    stat('আদায়',money(ps.collected),'s-green',ic.coll)+
    stat('খরচ',money(periodExp),'s-orange',ic.exp)+
    stat('লাভ',money(profit),profit>=0?'s-blue':'s-red',ic.profit)+
    stat('বাকি',money(ps.due),'s-red',ic.due);
  v.appendChild(grid);

  // ----- বকেয়া ইউনিট (প্রতি ভাড়াটিয়ার সর্বমোট আটকে থাকা — পিরিয়ড নিরপেক্ষ) -----
  const dueUnits=[];
  [...bRooms,...bShops].forEach(b=>{ const d=computeDue(b); if(d.remain>0) dueUnits.push({b,remain:d.remain}); });
  v.appendChild(el('div','sec-title',`বকেয়া ইউনিট (${bnum(dueUnits.length)})`));
  const dc=el('div','card');
  if(dueUnits.length===0){ dc.innerHTML='<div class="empty"><div class="big">✓</div>কোনো বকেয়া নেই</div>'; }
  else{
    dueUnits.sort((a,b)=>b.remain-a.remain).slice(0,8).forEach(({b,remain})=>{
      const r=el('div','row');
      r.innerHTML=`<div class="av">${b._type==='shop'?'🏬':'🛏️'}</div>
        <div class="main"><div class="n">${esc(b.unitNumber)} · ${esc(b.tenantName)}</div>
        <div class="s">${b._type==='shop'?'শপ':esc(propName(b.propertyId))} · ${esc(b.mobile||'')}</div></div>
        <div class="end"><span class="amt red">${money(remain)}</span></div>`;
      r.onclick=()=>{go('payments');setTimeout(()=>openTenant(b),60);};
      dc.appendChild(r);
    });
    if(dueUnits.length>8) dc.appendChild(el('div','',`<div style="text-align:center;font-size:12px;color:var(--muted);padding:8px">আরও ${bnum(dueUnits.length-8)} টি…</div>`));
  }
  v.appendChild(dc);

  // vacant quick list
  const vacR=rooms.filter(r=>!roomOcc.has(r.id));
  const vacS=shops.filter(s=>!shopOcc.has(s.id));
  v.appendChild(el('div','sec-title',`খালি ইউনিট (${bnum(vacR.length+vacS.length)})`));
  const vc=el('div','card');
  if(vacR.length+vacS.length===0){ vc.innerHTML='<div class="empty">কোনো খালি ইউনিট নেই</div>'; }
  else{
    [...vacR.map(x=>({x,t:'room'})),...vacS.map(x=>({x,t:'shop'}))].slice(0,12).forEach(({x,t})=>{
      const r=el('div','row');
      r.innerHTML=`<div class="av">${t==='shop'?'🏬':'🛏️'}</div>
        <div class="main"><div class="n">${esc(x.number)}</div><div class="s">${t==='shop'?'শপ':esc(propName(x.propertyId))}</div></div>
        <div class="end"><span class="tag vac">খালি</span></div>`;
      vc.appendChild(r);
    });
    if(vacR.length+vacS.length>12) vc.appendChild(el('div','',`<div style="text-align:center;font-size:12px;color:var(--muted);padding:8px">আরও ${bnum(vacR.length+vacS.length-12)} টি…</div>`));
  }
  v.appendChild(vc);
}

/* ============================================================
   9. ROOMS / SHOPS list  (vacant + occupied)
   ============================================================ */
function renderUnits(v,type){
  // শপ = সব বিল্ডিং একসাথে (ফিল্টার উপেক্ষা); রুম = বিল্ডিং ফিল্টার মানে
  const useFilter = (type==='room');
  const f = x => useFilter ? inProp(x) : true;
  const units=(type==='room'?S.cache.rooms:S.cache.shops).filter(f);
  const bks  =(type==='room'?S.cache.bRooms:S.cache.bShops).filter(f);
  const byUnit={}; bks.forEach(b=>byUnit[b.unitId]=b);

  $('#fab').classList.remove('hidden');
  $('#fab').onclick=()=>openUnitMgr(type);

  v.innerHTML='';
  if(units.length===0){
    v.innerHTML=`<div class="card"><div class="empty"><div class="big">${type==='shop'?'🏬':'🛏️'}</div>
      এখনো কোনো ${type==='shop'?'শপ':'রুম'} যোগ হয়নি।<br>নিচের + বাটনে ${type==='shop'?'শপ':'রুম'} যোগ করুন।</div></div>`;
    return;
  }
  const occ=el('div'),vac=el('div');
  let nOcc=0,nVac=0;
  units.sort((a,b)=>String(a.number).localeCompare(String(b.number),undefined,{numeric:true})).forEach(u=>{
    const b=byUnit[u.id];
    const r=el('div','row');
    if(b){
      nOcc++;
      const due=computeDue(b);
      const rentTxt = b._type==='shop' ? money(b.cycleRent)+' / '+bnum(b.cycleMonths)+'মা' : money(b.monthlyRent)+'/মা';
      const sub = b._type==='shop' ? 'ভাড়া '+rentTxt : 'ভাড়া '+rentTxt+' · '+esc(propName(u.propertyId));
      r.innerHTML=`<div class="av">${esc(u.number)}</div>
        <div class="main"><div class="n">${esc(b.tenantName)}</div>
        <div class="s">${sub}</div></div>
        <div class="end">${due.remain>0?`<span class="amt red">${money(due.remain)}</span>`:'<span class="tag paid">পরিশোধিত</span>'}</div>`;
      r.onclick=()=>openTenant(b);
    }else{
      nVac++;
      const vsub = type==='shop' ? 'খালি' : esc(propName(u.propertyId))+' · খালি';
      r.innerHTML=`<div class="av" style="background:#e9f7ef;color:var(--ok)">${esc(u.number)}</div>
        <div class="main"><div class="n">${esc(u.number)}</div><div class="s">${vsub}</div></div>
        <div class="end"><span class="tag vac">বুক করুন ›</span></div>`;
      r.onclick=()=>openBooking(type,u);
    }
    (b?occ:vac).appendChild(r);
  });

  const cVac=el('div','card'); cVac.innerHTML=`<div class="sec-title" style="margin-top:0">খালি (${bnum(nVac)}) — ট্যাপ করে বুক করুন</div>`;
  if(nVac===0)cVac.innerHTML+='<div class="empty">সব ভাড়া হয়ে গেছে</div>'; else cVac.appendChild(vac);
  const cOcc=el('div','card'); cOcc.innerHTML=`<div class="sec-title" style="margin-top:0">ভাড়াকৃত (${bnum(nOcc)})</div>`;
  if(nOcc===0)cOcc.innerHTML+='<div class="empty">কেউ নেই</div>'; else cOcc.appendChild(occ);
  v.appendChild(cVac); v.appendChild(cOcc);
}

/* ============================================================
   10. PAYMENTS  (search → tenant → due breakdown → receive)
   ============================================================ */
function renderPayments(v){
  v.innerHTML=`
    <div class="search"><input id="pay-q" placeholder="রুম/শপ নম্বর, মোবাইল, ইকামা বা নাম দিয়ে খুঁজুন"></div>
    <div class="sec-title" style="margin-top:4px">সকল ভাড়াটিয়া — ট্যাপ করে পেমেন্ট নিন</div>
    <div id="pay-results"></div>`;
  const q=$('#pay-q');
  q.addEventListener('input',()=>doSearch(q.value.trim()));
  doSearch('');
}

function doSearch(q){
  const box=$('#pay-results'); box.innerHTML='';
  let list=activeBookings();
  if(q){
    const t=q.toLowerCase();
    list=list.filter(b=>
      String(b.unitNumber).toLowerCase().includes(t) ||
      (b.mobile||'').toLowerCase().includes(t) ||
      (b.iqama||'').toLowerCase().includes(t) ||
      (b.tenantName||'').toLowerCase().includes(t));
  }
  const withDue=list.map(b=>({b,due:computeDue(b)}));
  withDue.sort((a,b)=>b.due.remain-a.due.remain);

  if(withDue.length===0){ box.innerHTML='<div class="card"><div class="empty">কোনো ভাড়াটিয়া পাওয়া যায়নি</div></div>'; return; }
  const card=el('div','card');
  withDue.forEach(({b,due})=>{
    const rentTxt = b._type==='shop' ? money(b.cycleRent)+'/'+bnum(b.cycleMonths)+'মা' : money(b.monthlyRent)+'/মা';
    const sub = b._type==='shop' ? 'শপ · ভাড়া '+rentTxt : esc(propName(b.propertyId))+' · ভাড়া '+rentTxt;
    const r=el('div','row');
    r.innerHTML=`<div class="av">${b._type==='shop'?'🏬':'🛏️'}</div>
      <div class="main"><div class="n">${esc(b.unitNumber)} · ${esc(b.tenantName)}</div>
      <div class="s">${sub}</div></div>
      <div class="end">${due.remain>0?`<span class="amt red">${money(due.remain)}</span>`:'<span class="tag paid">✓</span>'}</div>`;
    r.onclick=()=>openTenant(b);
    card.appendChild(r);
  });
  box.appendChild(card);
}

/* ---------- tenant detail + due breakdown ---------- */
function openTenant(b){
  const due=computeDue(b);
  const m=modal();
  let rows='';
  if(due.kind==='room'){
    const shown=due.months.filter(mo=>mo.remain>0 || mo.idx===due.nowIdx);
    if(shown.length===0) rows=`<div class="dr paid-row"><span class="m">সব মাস পরিশোধিত ✓</span><span>০ রি.</span></div>`;
    shown.forEach(mo=>{
      const isCur=mo.idx===due.nowIdx;
      const pd = mo.paid>0 && mo.remain>0 ? ` <span class="pd">(−${money(mo.paid)})</span>` : (mo.remain===0?' <span class="pd">✓</span>':'');
      rows+=`<div class="dr ${isCur?'cur':''} ${mo.remain===0?'paid-row':''}"><span class="m">${ymToLabel(mo.idx,true)}${pd}</span><span>${money(mo.remain)}</span></div>`;
    });
  }else{
    const isCurC=cy=>due.nowIdx>=cy.idx && due.nowIdx<=cy.endIdx;
    const shown=due.cycles.filter(cy=>cy.remain>0 || isCurC(cy));
    if(shown.length===0) rows=`<div class="dr paid-row"><span class="m">সব সাইকেল পরিশোধিত ✓</span><span>০ রি.</span></div>`;
    shown.forEach(cy=>{
      const isCur=isCurC(cy);
      const pd = cy.paid>0 && cy.remain>0 ? ` <span class="pd">(−${money(cy.paid)})</span>` : (cy.remain===0?' <span class="pd">✓</span>':'');
      rows+=`<div class="dr ${isCur?'cur':''} ${cy.remain===0?'paid-row':''}"><span class="m">${cycleLabel(cy,false)}${pd}</span><span>${money(cy.remain)}</span></div>`;
    });
  }
  const adv = due.advance>0?`<div class="dr paid-row"><span class="m">অগ্রিম জমা</span><span class="amt green">${money(due.advance)}</span></div>`:'';

  m.innerHTML=`
    <div class="handle"></div>
    <h3>${esc(b.unitNumber)} · ${esc(b.tenantName)}</h3>
    <div class="kv"><span class="k">${b._type==='shop'?'ধরন':'বিল্ডিং'}</span><span class="v">${b._type==='shop'?'শপ':esc(propName(b.propertyId))}</span></div>
    <div class="kv"><span class="k">মোবাইল</span><span class="v">${esc(b.mobile||'—')}</span></div>
    <div class="kv"><span class="k">ইকামা</span><span class="v">${esc(b.iqama||'—')}</span></div>
    <div class="kv"><span class="k">${b._type==='shop'?'সাইকেল ভাড়া':'মাসিক ভাড়া'}</span><span class="v">${money(b._type==='shop'?b.cycleRent:b.monthlyRent)}${b._type==='shop'?' / '+bnum(b.cycleMonths)+' মাস':''}</span></div>
    <div class="due-tbl">
      ${rows}
      <div class="dr"><span class="m">মোট পেআবল</span><span>${money(due.payable)}</span></div>
      <div class="dr paid-row"><span class="m">মোট পরিশোধ</span><span class="amt green">${money(due.paid)}</span></div>
      ${adv}
      <div class="dr tot"><span class="m">বাকি</span><span>${money(due.remain)}</span></div>

async function savePayment(b,due){
  const amt=+$('#rc-amt').value;
  if(!amt||amt<=0){toast('পরিমাণ দিন');return;}
  $('#rc-save').textContent='সেভ হচ্ছে…';
  const receiptNo='INV-'+Date.now().toString().slice(-7);
  // FIFO allocation labels (পেমেন্ট কোন কোন মাস/সাইকেল কভার করল)
  const allocs=[]; let pool=amt;
  const items = due.kind==='room'?due.months:due.cycles;
  for(const it of items){
    if(pool<=0)break;
    if(it.remain<=0)continue;
    const use=Math.min(pool,it.remain);
    allocs.push({label: due.kind==='room'?ymToLabel(it.idx,true):cycleLabel(it,true), amount:use});
    pool-=use;
  }
  if(pool>0) allocs.push({label:'অগ্রিম জমা',amount:pool});
  const pay={
    bookingId:b.id, bookingType:b._type, propertyId:b.propertyId,
    unitNumber:b.unitNumber, tenantName:b.tenantName, mobile:b.mobile||'',
    amount:amt, method:$('#rc-method').value, notes:$('#rc-note').value.trim(),
    receiptNo, allocations:allocs, createdAt:Date.now(), createdBy:S.user.uid, createdByName:S.name, deleted:false
  };
  try{
    const ref=await db.collection('payments').add(pay);
    pay.id=ref.id; S.cache.payments.push(pay);
    await audit('পেমেন্ট তৈরি','payment',`${b.unitNumber} · ${money(amt)} · ${receiptNo}`);
    closeModal();
    showReceipt(b,pay);
    toast('পেমেন্ট সেভ হয়েছে');
  }catch(e){ toast('সেভ ব্যর্থ'); $('#rc-save').textContent='সেভ ও রিসিট'; }
}

// jsPDF lazy load → PDF from receipt HTML via html2canvas
let _libsLoaded=false;
function loadPdfLibs(){
  if(_libsLoaded) return Promise.resolve();
  const add=src=>new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  return add('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js')
    .then(()=>add('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'))
    .then(()=>{_libsLoaded=true;});
}
function printDoc(html){
  $('#receipt-print').innerHTML='<div class="a4">'+html+'</div>';
  setTimeout(()=>window.print(),50);
}
async function makePDF(html,name){
  toast('PDF তৈরি হচ্ছে…');
  await loadPdfLibs();
  const holder=el('div');
  holder.style.cssText='position:fixed;left:-9999px;top:0;width:720px;background:#fff;padding:24px';
  holder.innerHTML=html; document.body.appendChild(holder);
  const canvas=await html2canvas(holder.firstElementChild||holder,{scale:2,backgroundColor:'#fff'});
  document.body.removeChild(holder);
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'p',unit:'pt',format:'a4'});
  const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
  const margin=28;
  const imgW=pw-margin*2;
  const scale=imgW/canvas.width;            // px → pt
  const pageInnerPx=(ph-margin*2)/scale;     // এক পেজে কত px আঁটে
  let sy=0, page=0;
  while(sy<canvas.height){
    const sliceH=Math.min(pageInnerPx, canvas.height-sy);
    const c2=document.createElement('canvas');
    c2.width=canvas.width; c2.height=sliceH;
    c2.getContext('2d').drawImage(canvas,0,sy,canvas.width,sliceH,0,0,canvas.width,sliceH);
    const part=c2.toDataURL('image/jpeg',0.95);
    if(page>0) pdf.addPage();
    pdf.addImage(part,'JPEG',margin,margin,imgW,sliceH*scale);
    sy+=sliceH; page++;
  }
  pdf.save((name||'document')+'.pdf');
}

async function saveBooking(type){
  const unitId=$('#bk-unit').value;
  const name=$('#bk-name').value.trim();
  const rent=+$('#bk-rent').value;
  if(!unitId){toast('ইউনিট নির্বাচন করুন');return;}
  if(!name){toast('নাম দিন');return;}
  if(!rent||rent<=0){toast('ভাড়া দিন');return;}
  const units=type==='room'?S.cache.rooms:S.cache.shops;
  const unit=units.find(u=>u.id===unitId);
  $('#bk-save').textContent='সেভ হচ্ছে…';
  const base={
    propertyId:unit.propertyId, unitId, unitNumber:unit.number,
    tenantName:name, mobile:$('#bk-mobile').value.trim(), iqama:$('#bk-iqama').value.trim(),
    startDate:$('#bk-start').value, notes:$('#bk-note').value.trim(),
    status:'active', createdAt:Date.now(), createdBy:S.user.uid
  };
  let doc, coll, cacheArr, _type;
  if(type==='room'){ doc={...base,monthlyRent:rent}; coll='bookings_rooms'; cacheArr=S.cache.bRooms; _type='room'; }
  else{ doc={...base,cycleRent:rent,cycleMonths:+$('#bk-cycle').value}; coll='bookings_shops'; cacheArr=S.cache.bShops; _type='shop'; }
  try{
    const ref=await db.collection(coll).add(doc);
    const nb={id:ref.id,_type,...doc};
    cacheArr.push(nb);
    await audit('বুকিং তৈরি','booking',`${unit.number} · ${name}`);
    closeModal(); render(); buildPills();
    showBookingCopy(nb);
  }catch(e){toast('ব্যর্থ');$('#bk-save').textContent='বুকিং সেভ';}
}

async function endTenancy(b){
  if(!confirm(`${b.unitNumber} ইউনিট খালি করবেন? ভাড়াটিয়া সরে যাবে, ইউনিট আবার খালি দেখাবে।`))return;
  const coll=b._type==='room'?'bookings_rooms':'bookings_shops';
  try{
    await db.collection(coll).doc(b.id).update({status:'ended',endedAt:Date.now()});
    const arr=b._type==='room'?S.cache.bRooms:S.cache.bShops;
    const i=arr.findIndex(x=>x.id===b.id); if(i>-1)arr.splice(i,1);
    await audit('ইউনিট খালি','booking',`${b.unitNumber} · ${b.tenantName}`);
    closeModal(); render(); toast('ইউনিট খালি হয়েছে');
  }catch(e){toast('ব্যর্থ');}
}

    : '';
  m.innerHTML=`<div class="handle"></div>
    <h3>${type==='room'?'🛏️ রুম যোগ':'🏬 শপ যোগ'}</h3>
    ${buildingField}
    <div class="field"><label>${type==='room'?'রুম':'শপ'} নম্বর (একাধিক হলে কমা দিয়ে)</label>
      <input id="um-nums" placeholder="${type==='room'?'১০১,১০২,১০৩':'S1,S2,S3'}"></div>
    <div class="modal-row"><button class="btn btn-ghost" onclick="closeModal()">বাতিল</button>
      <button class="btn btn-primary" id="um-save">যোগ করুন</button></div>`;
  $('#um-save').onclick=()=>saveUnits(type);
}
async function saveUnits(type){
  const pid = type==='room' ? $('#um-prop').value : null;
  const nums=$('#um-nums').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(type==='room' && !pid){toast('বিল্ডিং নির্বাচন করুন');return;}
  if(nums.length===0){toast('নম্বর দিন');return;}
  $('#um-save').textContent='যোগ হচ্ছে…';
  const coll=type==='room'?'rooms':'shops';
  const cacheArr=type==='room'?S.cache.rooms:S.cache.shops;
  const batch=db.batch();
  const added=[];
  nums.forEach(n=>{
    const ref=db.collection(coll).doc();
    const doc = type==='room' ? {propertyId:pid,number:n,createdAt:Date.now()} : {number:n,createdAt:Date.now()};
    batch.set(ref,doc); added.push({id:ref.id,...doc});
  });
  try{
    await batch.commit();
    cacheArr.push(...added);
    await audit(type==='room'?'রুম যোগ':'শপ যোগ','unit',`${nums.length} টি${pid?' · '+propName(pid):''}`);
    closeModal(); render(); toast(`${bnum(nums.length)} টি যোগ হয়েছে`);
  }catch(e){toast('ব্যর্থ');$('#um-save').textContent='যোগ করুন';}
}

function expenseRange(scope,fromIdx,toIdx){
  return S.cache.expenses.filter(e=>{
    const i=ym(new Date(e.date));
    return i>=fromIdx && i<=toIdx && (scope==='all'||e.propertyId===scope);
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));
}

    <div class="field"><label>তারিখ</label><input id="xe-date" type="date" value="${e.date}"></div>
    <div class="field"><label>নোট</label><input id="xe-note" value="${esc(e.notes||'')}"></div>
    <div class="modal-row"><button class="btn btn-ghost" onclick="closeModal()">বাতিল</button>
      <button class="btn btn-primary" id="xe-save">সেভ</button></div>`;
  $('#xe-save').onclick=async()=>{
    const amt=+$('#xe-amt').value; if(!amt||amt<=0){toast('পরিমাণ দিন');return;}
    const upd={category:$('#xe-cat').value,amount:amt,propertyId:$('#xe-prop').value,date:$('#xe-date').value,notes:$('#xe-note').value.trim()};
    try{ await db.collection('expenses').doc(id).update(upd); Object.assign(e,upd);
      await audit('খরচ এডিট','expense',`${upd.category} · ${money(amt)}`); openExpenses(); toast('আপডেট হয়েছে');
    }catch(err){toast('ব্যর্থ');}
  };
}
async function delExpense(id){
  if(!confirm('এই খরচ মুছবেন?'))return;
  try{ await db.collection('expenses').doc(id).update({deleted:true,deletedAt:Date.now(),deletedBy:S.user.uid});
    const e=S.cache.expenses.find(x=>x.id===id); if(e)e.deleted=true;
    S.cache.expenses=S.cache.expenses.filter(x=>!x.deleted);
    await audit('খরচ মুছে ফেলা','expense',id); openExpenses(); toast('মুছে ফেলা হয়েছে');
  }catch(e){toast('ব্যর্থ');}
}
async function saveExpense(){
  const amt=+$('#ex-amt').value;
  if(!amt||amt<=0){toast('পরিমাণ দিন');return;}
  const doc={category:$('#ex-cat').value,amount:amt,propertyId:$('#ex-prop').value,
    date:$('#ex-date').value,notes:$('#ex-note').value.trim(),createdAt:Date.now(),createdBy:S.user.uid,deleted:false};
  $('#ex-save').textContent='যোগ হচ্ছে…';
  try{
    const ref=await db.collection('expenses').add(doc);
    S.cache.expenses.unshift({id:ref.id,...doc});
    await audit('খরচ যোগ','expense',`${doc.category} · ${money(amt)}`);
    openExpenses(); toast('খরচ যোগ হয়েছে');
  }catch(e){toast('ব্যর্থ');}
}

/* ---------- Reports (রেঞ্জ-ভিত্তিক: প্রপার্টি + শুরু→শেষ মাস) ---------- */
const RTH='padding:7px 9px;font-size:11px;border:1px solid #d9e1ea;background:#16365f;color:#fff;white-space:nowrap';
const RTD='padding:6px 9px;font-size:11.5px;border:1px solid #e4eaf1;white-space:nowrap';
function openReports(){
  const nowIdx=todayYM();
  if(!S.rep) S.rep={scope:'all', from:nowIdx-5, to:nowIdx};
  const m=modal();
  m.innerHTML=`<div class="handle"></div><h3>📊 রিপোর্ট</h3>
    <div class="field"><label>প্রপার্টি</label><select id="rp-scope"></select></div>
    <div class="grid2">
      <div class="field"><label>শুরুর মাস</label><select id="rp-from"></select></div>
      <div class="field"><label>শেষ মাস</label><select id="rp-to"></select></div>
    </div>
    <div id="rp-body"></div>
    <div class="modal-row">
      <button class="btn btn-blue" id="rp-pdf">📄 PDF (A4)</button>
      <button class="btn btn-ghost" id="rp-print">প্রিন্ট</button>
    </div>
    <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:8px">বন্ধ</button>`;
  const scopeOpts=['<option value="all">🏢 সব (রুম+শপ)</option>']
    .concat(S.properties.map(p=>`<option value="${p.id}">${esc(p.name)} (রুম)</option>`))
    .concat(['<option value="__shops">সব শপ</option>']).join('');
  $('#rp-scope').innerHTML=scopeOpts;
  let monthOpts='';
  for(let i=nowIdx-35;i<=nowIdx;i++) monthOpts+=`<option value="${i}">${ymToLabel(i,true)}</option>`;
  $('#rp-from').innerHTML=monthOpts; $('#rp-to').innerHTML=monthOpts;
  $('#rp-scope').value=S.rep.scope; $('#rp-from').value=S.rep.from; $('#rp-to').value=S.rep.to;
  const draw=()=>{
    S.rep.scope=$('#rp-scope').value; S.rep.from=+$('#rp-from').value; S.rep.to=+$('#rp-to').value;
    if(S.rep.from>S.rep.to){ S.rep.from=S.rep.to; $('#rp-from').value=S.rep.to; }
    const html=reportHTML(S.rep.scope,S.rep.from,S.rep.to);
    $('#rp-body').innerHTML=`<div style="border:1px solid var(--line);border-radius:10px;overflow:auto;margin:6px 0 12px">${html}</div>`;
    $('#rp-pdf').onclick=()=>makePDF(html,'report');
    $('#rp-print').onclick=()=>printDoc(html);
  };
  $('#rp-scope').onchange=draw; $('#rp-from').onchange=draw; $('#rp-to').onchange=draw;
  draw();
}

function reportHTML(scope,fromIdx,toIdx){
  let bks, scopeName, isShop=scope==='__shops';
  if(scope==='all'){ bks=[...S.cache.bRooms,...S.cache.bShops]; scopeName='সব প্রপার্টি (রুম+শপ)'; }
  else if(isShop){ bks=S.cache.bShops.slice(); scopeName='সব শপ'; }
  else { bks=S.cache.bRooms.filter(b=>b.propertyId===scope); scopeName=propName(scope)+' (রুম)'; }
  bks.sort((a,b)=>String(a.unitNumber).localeCompare(String(b.unitNumber),undefined,{numeric:true}));

  let tCharge=0,tPaid=0,tDue=0, rows='';
  bks.forEach(b=>{
    const st=bookingRangeStat(b,fromIdx,toIdx);
    if(st.charge===0 && st.paid===0) return;
    tCharge+=st.charge; tPaid+=st.paid; tDue+=st.due;
    const rent = b._type==='shop'? money(b.cycleRent)+'/'+bnum(b.cycleMonths)+'মা' : money(b.monthlyRent);
    rows+=`<tr><td style="${RTD};font-weight:700">${esc(b.unitNumber)}</td>
      <td style="${RTD}">${esc(b.tenantName)}${b._type==='shop'?' <span style="color:#f47920;font-size:9px">শপ</span>':''}</td>
      <td style="${RTD};text-align:right">${rent}</td>
      <td style="${RTD};text-align:right;color:#1f9d61">${bnum(st.paid)}</td>
      <td style="${RTD};text-align:right;color:${st.due>0?'#d64545':'#1f9d61'};font-weight:700">${bnum(st.due)}</td></tr>`;
  });
  if(!rows) rows=`<tr><td style="${RTD}" colspan="5">এই রেঞ্জে কোনো তথ্য নেই</td></tr>`;
  let exp=0;
  if(!isShop){
    S.cache.expenses.forEach(e=>{ const i=ym(new Date(e.date));
      if(i>=fromIdx&&i<=toIdx && (scope==='all'||e.propertyId===scope)) exp+=(+e.amount||0); });
  }
  const profit=tPaid-exp;
  const d=new Date();
  const card=(lbl,val,col)=>`<td style="padding:10px 12px;border:1px solid #e4eaf1;background:#f8fafc">
    <div style="font-size:11px;color:#6b7785">${lbl}</div><div style="font-family:Sora;font-weight:700;font-size:14px;color:${col}">${val}</div></td>`;
  return `<div style="font-family:'Hind Siliguri',sans-serif;padding:16px;background:#fff;color:#1e1e1e;min-width:520px">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px">
      <div><div style="display:flex;align-items:center;gap:8px"><img src="${LOGO}" style="height:38px"/><div style="font-family:Sora;font-weight:700;font-size:16px;color:#16365f">ইনসাফ প্রপার্টি</div></div>
      <div style="font-size:12px;color:#6b7785">${esc(scopeName)} · ${ymToLabel(fromIdx,true)} — ${ymToLabel(toIdx,true)}</div></div>
      <div style="font-size:11px;color:#6b7785">${bnum(d.getDate())}/${bnum(d.getMonth()+1)}/${bnum(d.getFullYear())}</div></div>
    <table style="border-collapse:collapse;width:100%;margin-bottom:14px"><tr>
      ${card('প্রত্যাশিত',money(tCharge),'#16365f')}
      ${card('আদায়',money(tPaid),'#1f9d61')}
      ${card('খরচ',money(exp),'#d9650f')}
      ${card('বকেয়া',money(tDue),'#d64545')}
      ${card('নিট লাভ',money(profit),profit>=0?'#16365f':'#d64545')}
    </tr></table>
    <div style="font-weight:700;color:#16365f;font-size:13px;margin-bottom:6px">ভাড়াটিয়াভিত্তিক বিবরণ</div>
    <table style="border-collapse:collapse;width:100%">
      <thead><tr>
        <th style="${RTH}">ইউনিট</th><th style="${RTH}">নাম</th><th style="${RTH}">মাসিক ভাড়া</th>
        <th style="${RTH}">আদায়</th><th style="${RTH}">বকেয়া</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td style="${RTD};font-weight:700" colspan="3">মোট</td>
        <td style="${RTD};text-align:right;font-weight:700;color:#1f9d61">${bnum(tPaid)}</td>
        <td style="${RTD};text-align:right;font-weight:700;color:#d64545">${bnum(tDue)}</td></tr></tfoot>
    </table>
  </div>`;
}

/* ---------- Booking Register (বিল্ডিংভিত্তিক টেবিল, প্রিন্ট) ---------- */
function openRegister(){
  const m=modal();
  const opts=S.properties.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')+'<option value="__shops">সব শপ</option>';
  m.innerHTML=`<div class="handle"></div><h3>🧾 বুকিং রেজিস্টার</h3>
    <div class="field"><label>বিল্ডিং / শপ</label><select id="reg-sel">${opts}</select></div>
    <div id="reg-body" style="overflow-x:auto"></div>
    <div class="modal-row">
      <button class="btn btn-blue" id="reg-pdf">📄 PDF</button>
      <button class="btn btn-ghost" id="reg-print">প্রিন্ট</button>
    </div>
    <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:8px">বন্ধ</button>`;
  const draw=()=>{ const html=registerHTML($('#reg-sel').value);
    $('#reg-body').innerHTML=`<div style="border:1px solid var(--line);border-radius:10px;overflow:auto;margin-bottom:12px">${html}</div>`;
    $('#reg-pdf').onclick=()=>makePDF(html,'register');
    $('#reg-print').onclick=()=>{ printDoc(html); };
  };
  $('#reg-sel').onchange=draw; draw();
}

function registerHTML(sel){
  const nowIdx=todayYM();
  const monthIdxs=[]; for(let i=nowIdx-5;i<=nowIdx;i++) monthIdxs.push(i);   // শেষ ৬ মাস
  const th='padding:7px 9px;font-size:11px;border:1px solid #d9e1ea;background:#16365f;color:#fff;white-space:nowrap';
  const td='padding:6px 9px;font-size:11.5px;border:1px solid #e4eaf1;white-space:nowrap';
  let title, list, isShop=sel==='__shops';
  if(isShop){ title='সব শপ'; list=S.cache.bShops.slice(); }
  else { title=propName(sel); list=S.cache.bRooms.filter(b=>b.propertyId===sel); }
  list.sort((a,b)=>String(a.unitNumber).localeCompare(String(b.unitNumber),undefined,{numeric:true}));

  const monthHead=monthIdxs.map(i=>`<th style="${th}">${ymToLabel(i,false)}</th>`).join('');
  let body='';
  if(list.length===0){ body=`<tr><td style="${td}" colspan="${monthIdxs.length+3}">কোনো বুকিং নেই</td></tr>`; }
  list.forEach(b=>{
    const due=computeDue(b);
    const cell=idx=>{
      if(due.kind==='room'){
        const mo=due.months.find(x=>x.idx===idx);
        if(!mo) return `<td style="${td};color:#bbb;text-align:center">—</td>`;
        return mo.remain===0
          ? `<td style="${td};text-align:center;color:#1f9d61;font-weight:700">✓</td>`
          : `<td style="${td};text-align:center;color:#d64545;font-weight:700">${bnum(mo.remain)}</td>`;
      }else{
        const cy=due.cycles.find(c=>idx>=c.idx && idx<=c.endIdx);
        if(!cy) return `<td style="${td};color:#bbb;text-align:center">—</td>`;
        return cy.remain===0
          ? `<td style="${td};text-align:center;color:#1f9d61;font-weight:700">✓</td>`
          : `<td style="${td};text-align:center;color:#d64545;font-weight:700">${bnum(cy.remain)}</td>`;
      }
    };
    const rent = isShop ? money(b.cycleRent)+'/'+bnum(b.cycleMonths)+'মা' : money(b.monthlyRent);
    body+=`<tr><td style="${td};font-weight:700">${esc(b.unitNumber)}</td>
      <td style="${td}">${esc(b.tenantName)}</td>
      <td style="${td};text-align:right">${rent}</td>
      ${monthIdxs.map(cell).join('')}</tr>`;
  });
  const d=new Date();
  return `<div style="font-family:'Hind Siliguri',sans-serif;padding:16px;background:#fff;color:#1e1e1e;min-width:560px">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">
      <div><div style="display:flex;align-items:center;gap:8px"><img src="${LOGO}" style="height:38px"/><div style="font-family:Sora;font-weight:700;font-size:16px;color:#16365f">ইনসাফ প্রপার্টি</div></div>
      <div style="font-size:12px;color:#6b7785">${esc(title)}</div></div>
      <div style="font-size:11px;color:#6b7785">${bnum(d.getDate())}/${bnum(d.getMonth()+1)}/${bnum(d.getFullYear())}</div></div>
    <table style="border-collapse:collapse;width:100%">
      <thead><tr><th style="${th}">${isShop?'শপ':'রুম'}</th><th style="${th}">নাম</th><th style="${th}">${isShop?'সাইকেল ভাড়া':'মাসিক ভাড়া'}</th>${monthHead}</tr></thead>
      <tbody>${body}</tbody>
    </table>
    <div style="font-size:10.5px;color:#6b7785;margin-top:8px">✓ = ঐ মাস পরিশোধিত · লাল সংখ্যা = ঐ মাসের বকেয়া · — = প্রযোজ্য নয়</div>
  </div>`;
}

/* ---------- Buildings ---------- */

  const m=modal();
  let list=S.properties.map(p=>{
    const rc=S.cache.rooms.filter(r=>r.propertyId===p.id).length;

/* ---------- Users ---------- */

      প্রথমবার লগইন করলে স্বয়ংক্রিয়ভাবে রিসেপশনিস্ট হিসেবে যুক্ত হবে; role পরিবর্তন Firestore <b>users</b> কালেকশনে করতে হবে।
    </div>
    <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:12px">বন্ধ</button>`;

/* ---------- Audit log ---------- */
async function openAudit(){
  const m=modal();
  let snap; try{ snap=await db.collection('audit_logs').orderBy('at','desc').limit(80).get(); }catch(e){ snap={docs:[]}; }
  let list=snap.docs.map(d=>{const a=d.data();const dt=new Date(a.at);
    return `<div class="row"><div class="main"><div class="n">${esc(a.action)}</div>
      <div class="s">${esc(a.detail||'')} · ${esc(a.byName||'')}</div></div>
      <div class="end"><div class="s">${bnum(dt.getDate())}/${bnum(dt.getMonth()+1)} ${bnum(dt.getHours())}:${String(dt.getMinutes()).padStart(2,'0').replace(/[0-9]/g,x=>BN[x])}</div></div></div>`;
  }).join('')||'<div class="empty">কোনো লগ নেই</div>';
  m.innerHTML=`<div class="handle"></div><h3>📋 অডিট লগ</h3><div class="card" style="box-shadow:none;padding:0">${list}</div>
    <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:10px">বন্ধ</button>`;
}

/* ============================================================
   15. MODAL + BACK BUTTON
   ============================================================ */
function modal(){
  const root=$('#modal-root');
  root.innerHTML='';
  const bg=el('div','modal-bg'); const mo=el('div','modal');
  bg.appendChild(mo); root.appendChild(bg);
  bg.onclick=e=>{ if(e.target===bg) closeModal(); };
  try{ history.pushState({modal:true},''); }catch(e){}
  return mo;
}
function closeModal(){ $('#modal-root').innerHTML=''; try{ if(history.state&&history.state.modal) history.back(); }catch(e){} }
window.addEventListener('popstate',()=>{ if($('#modal-root').innerHTML) $('#modal-root').innerHTML=''; });
window.closeModal=closeModal;

/* ---------- service worker ---------- */
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
